<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Your Resources — PrepHunt</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #FFF9F9;
            font-family: 'Gabarito', sans-serif;
        }

        .resource-course-group {
            margin-bottom: 2rem;
        }

        .resource-course-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.85rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--color-border);
        }

        .resource-course-header .course-badge {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6c47ff;
            background: #ede9fe;
            padding: 2px 9px;
            border-radius: 99px;
        }

        .resource-course-header .chapter-badge {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #0d9488;
            background: #ccfbf1;
            padding: 2px 9px;
            border-radius: 99px;
        }

        .resource-course-header h6 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--color-text-primary);
            margin: 0;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--color-text-secondary);
        }
        .empty-state i {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
<div class="container-fluid px-4 py-3">

    <div th:replace="navigation/index :: topbar"></div>

    <div class="row align-items-stretch">

        <!-- SIDEBAR -->
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col besides">

            <div class="d-flex justify-content-between align-items-center mb-4 page-header page-title">
                <h2 class="fw-bold">Your Resources</h2>
            </div>

            <!-- Grouped resource table: one section per chapter -->
            <div th:if="${pdfs != null and !#lists.isEmpty(pdfs)}">

                <div class="resource-table-wrap">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Course / Chapter</th>
                            <th>Uploaded</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="res : ${pdfs}">
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <span class="resource-icon"
                                          th:classappend="${res.resourceType == 'PDF'} ? ' pdf' : ' note'">
                                        <i class="bi"
                                           th:classappend="${res.resourceType == 'PDF'} ? ' bi-file-earmark-pdf' : ' bi-journal-text'"></i>
                                    </span>
                                    <span class="fw-medium" th:text="${res.resourceName}">filename.pdf</span>
                                </div>
                            </td>
                            <td>
                                <span class="badge-type"
                                      th:classappend="${res.resourceType == 'PDF'} ? ' badge-pdf' : ' badge-note'"
                                      th:text="${res.resourceType}">PDF</span>
                            </td>
                            <td class="text-muted small">
                                <span th:text="${res.courseName}">Course</span>
                                <span class="text-muted mx-1">/</span>
                                <span th:text="${res.chapterTitle}">Chapter</span>
                            </td>
                            <td class="text-muted small"
                                th:text="${res.uploadedAt != null} ? ${#temporals.format(res.uploadedAt, 'dd MMM yyyy')} : '—'">—</td>
                            <td class="text-end">
                                <div class="d-flex justify-content-end gap-2">
                                    <!-- Edit note button — only for notes, links back to notes editor -->
                                    <a th:if="${res.resourceType == 'Note'}"
                                       class="btn btn-sm btn-outline-primary rounded-2"
                                       th:href="@{/notes-editor(resourceId=${res.resourceId})}">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a class="btn btn-sm btn-outline-secondary rounded-2"
                                       th:href="@{'/files/' + ${res.resourcePath}}" download>
                                        <i class="bi bi-download"></i>
                                    </a>
                                    <button class="btn btn-sm btn-outline-danger rounded-2"
                                            th:attr="data-resource-id=${res.resourceId}, data-resource-name=${res.resourceName}"
                                            onclick="confirmDelete(this)">
                                        <i class="bi bi-trash3"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>

            <!-- Empty state -->
            <div class="empty-state" th:if="${pdfs == null or #lists.isEmpty(pdfs)}">
                <i class="bi bi-folder2-open"></i>
                <p class="fw-semibold mb-1">No resources yet</p>
                <p class="small">Resources you upload inside any chapter will appear here.</p>
            </div>

        </div>
    </div>

    <div th:replace="footer/index :: footer"></div>
</div>

<!-- Delete Confirmation Dialog -->
<div class="dialog-backdrop" id="deleteDialog">
    <div class="dialog-box">
        <div class="dialog-icon danger"><i class="bi bi-trash3"></i></div>
        <div class="dialog-title">Delete Resource</div>
        <div class="dialog-message" id="deleteDialogMessage">Are you sure you want to delete this file?</div>
        <div class="dialog-actions">
            <button class="btn btn-light" onclick="closeDialog('deleteDialog')">Cancel</button>
            <button class="btn btn-danger" id="deleteConfirmBtn">Delete</button>
        </div>
    </div>
</div>

<!-- Error Dialog -->
<div class="dialog-backdrop" id="errorDialog">
    <div class="dialog-box">
        <div class="dialog-icon error"><i class="bi bi-exclamation-triangle"></i></div>
        <div class="dialog-title">Something went wrong</div>
        <div class="dialog-message" id="errorDialogMessage">An error occurred.</div>
        <div class="dialog-actions">
            <button class="btn btn-dark" onclick="closeDialog('errorDialog')">OK</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:1100;">
    <div id="uploadToast" class="toast align-items-center text-bg-dark border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body w-100">
                <div id="toastMessage">Working...</div>
                <div class="progress mt-2" style="height:4px;">
                    <div id="uploadProgress" class="progress-bar" style="width:0%;"></div>
                </div>
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function openDialog(id)  { document.getElementById(id).classList.add('show'); }
    function closeDialog(id) { document.getElementById(id).classList.remove('show'); }

    document.querySelectorAll('.dialog-backdrop').forEach(b => {
        b.addEventListener('click', e => { if (e.target === b) closeDialog(b.id); });
    });

    let pendingDeleteId = null;

    function confirmDelete(btn) {
        pendingDeleteId = btn.dataset.resourceId;
        const name = btn.dataset.resourceName || 'this file';
        document.getElementById('deleteDialogMessage').innerText =
            'Are you sure you want to delete "' + name + '"? This cannot be undone.';
        openDialog('deleteDialog');
    }

    document.getElementById('deleteConfirmBtn').addEventListener('click', () => {
        if (!pendingDeleteId) return;
        closeDialog('deleteDialog');
        fetch('/delete-resource/' + pendingDeleteId, { method: 'DELETE' })
            .then(r => r.ok ? location.reload() : openDialog('errorDialog'));
        pendingDeleteId = null;
    });
</script>
</body>
</html>
