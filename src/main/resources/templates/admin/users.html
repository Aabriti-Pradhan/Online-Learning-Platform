<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management – PrepHunt Admin</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #FFF9F9;
            font-family: 'Gabarito', sans-serif;
        }
        .filter-bar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .filter-bar input[type="text"] {
            padding: 0.45rem 0.85rem;
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            font-family: inherit;
            width: 220px;
        }
        .filter-bar input[type="text"]:focus { outline: none; border-color: #7c3aed; }
        .filter-bar select {
            padding: 0.45rem 0.85rem;
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            font-family: inherit;
            background: #fff;
            cursor: pointer;
        }
        .filter-bar select:focus { outline: none; border-color: #7c3aed; }
        .filter-bar button {
            padding: 0.45rem 1rem;
            background: #7c3aed;
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            font-family: inherit;
            cursor: pointer;
        }
        .filter-bar button:hover { background: #6d28d9; }
        .filter-bar .btn-reset { background: #f3f4f6; color: #374151; }
        .filter-bar .btn-reset:hover { background: #e5e7eb; }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            font-size: 0.88rem;
        }
        .users-table th {
            background: #f9fafb;
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-secondary);
            border-bottom: 1px solid var(--color-border);
        }
        .users-table td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid #f3f4f6;
            vertical-align: middle;
        }
        .users-table tr:last-child td { border-bottom: none; }
        .users-table tr.inactive-row { opacity: 0.5; }
        .users-table tr:hover td { background: #fafafa; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .status-active   { background: #dcfce7; color: #166534; }
        .status-inactive { background: #fee2e2; color: #991b1b; }

        .action-btn {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .btn-deactivate { background: #fee2e2; color: #991b1b; }
        .btn-deactivate:hover { background: #fecaca; }
        .btn-activate   { background: #dcfce7; color: #166534; }
        .btn-activate:hover { background: #bbf7d0; }

        .role-select {
            padding: 3px 8px;
            border: 1.5px solid var(--color-border);
            border-radius: 6px;
            font-size: 0.78rem;
            font-family: inherit;
            background: #fff;
            cursor: pointer;
        }
        .role-select:focus { outline: none; border-color: #7c3aed; }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--color-text-secondary);
        }

        .admin-toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: #1f2937;
            color: #fff;
            padding: 0.65rem 1.25rem;
            border-radius: 8px;
            font-size: 0.85rem;
            z-index: 9999;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }
        .admin-toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
<div class="container-fluid px-4 py-3">

    <div th:replace="navigation/index :: topbar"></div>

    <div class="row align-items-stretch">
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>

        <div class="col besides">

            <div class="d-flex align-items-center gap-3 mb-4 page-header page-title">
                <div>
                    <h2 class="fw-bold mb-0">User Management</h2>
                    <p class="text-muted small mb-0" th:text="${users.size()} + ' user(s) found'">Users</p>
                </div>
            </div>

            <form method="get" action="/admin/users" class="filter-bar">
                <input type="text" name="search" th:value="${search}" placeholder="Search name or email…">
                <select name="role">
                    <option value="" th:selected="${roleFilter == ''}">All roles</option>
                    <option value="STUDENT" th:selected="${roleFilter == 'STUDENT'}">Students</option>
                    <option value="TEACHER" th:selected="${roleFilter == 'TEACHER'}">Teachers</option>
                    <option value="ADMIN"   th:selected="${roleFilter == 'ADMIN'}">Admins</option>
                </select>
                <button type="submit">Filter</button>
                <a href="/admin/users" class="action-btn btn-reset"
                   style="text-decoration:none;padding:0.45rem 1rem;">Reset</a>
            </form>

            <div th:if="${users.isEmpty()}" class="empty-state">
                <i class="bi bi-people" style="font-size:2.5rem;opacity:0.3;"></i>
                <p class="mt-2">No users match your filter.</p>
            </div>

            <table class="users-table" th:if="${!users.isEmpty()}">
                <thead>
                <tr>
                    <th>User</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}"
                    th:classappend="${!user.active} ? 'inactive-row' : ''"
                    th:id="'row-' + ${user.userId}">
                    <td th:text="${user.username}">Username</td>
                    <td th:text="${user.email}">email@example.com</td>
                    <td>
                        <select class="role-select" th:data-uid="${user.userId}" onchange="changeRole(this)">
                            <option value="STUDENT" th:selected="${user.role == 'STUDENT'}">Student</option>
                            <option value="TEACHER" th:selected="${user.role == 'TEACHER'}">Teacher</option>
                            <option value="ADMIN"   th:selected="${user.role == 'ADMIN'}">Admin</option>
                        </select>
                    </td>
                    <td>
                            <span th:id="'status-' + ${user.userId}"
                                  th:class="${user.active} ? 'status-badge status-active' : 'status-badge status-inactive'"
                                  th:text="${user.active} ? 'Active' : 'Inactive'">Active</span>
                    </td>
                    <td>
                        <button th:id="'toggle-' + ${user.userId}"
                                th:class="${user.active} ? 'action-btn btn-deactivate' : 'action-btn btn-activate'"
                                th:text="${user.active} ? 'Deactivate' : 'Activate'"
                                th:data-uid="${user.userId}"
                                th:data-active="${user.active}"
                                onclick="toggleActive(this)">
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

    <div th:replace="footer/index :: footer"></div>
</div>

<div class="admin-toast" id="adminToast"></div>

<script th:src="@{/js/script.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function showToast(msg, isError) {
        const t = document.getElementById('adminToast');
        t.textContent = msg;
        t.style.background = isError ? '#991b1b' : '#1f2937';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    async function toggleActive(btn) {
        const uid       = btn.dataset.uid;
        const active    = btn.dataset.active === 'true';
        const newActive = !active;
        try {
            const res  = await fetch(`/admin/users/${uid}/toggle-active`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `active=${newActive}`
            });
            const data = await res.json();
            if (!res.ok) { showToast(data.message, true); return; }
            btn.dataset.active = String(newActive);
            btn.textContent    = newActive ? 'Deactivate' : 'Activate';
            btn.className      = newActive ? 'action-btn btn-deactivate' : 'action-btn btn-activate';
            const badge        = document.getElementById('status-' + uid);
            badge.textContent  = newActive ? 'Active' : 'Inactive';
            badge.className    = newActive ? 'status-badge status-active' : 'status-badge status-inactive';
            document.getElementById('row-' + uid).classList.toggle('inactive-row', !newActive);
            showToast(data.message, false);
        } catch (e) { showToast('Request failed', true); }
    }

    async function changeRole(select) {
        const uid  = select.dataset.uid;
        const role = select.value;
        try {
            const res  = await fetch(`/admin/users/${uid}/change-role`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `role=${role}`
            });
            const data = await res.json();
            if (!res.ok) { showToast(data.message, true); return; }
            showToast(data.message, false);
        } catch (e) { showToast('Request failed', true); }
    }
</script>
</body>
</html>
