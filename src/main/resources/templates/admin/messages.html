<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Messages – PrepHunt Admin</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #FFF9F9; font-family: 'Gabarito', sans-serif; }

        .message-card {
            background: white;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem 1.75rem;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.15s;
            display: flex;
            gap: 1.25rem;
        }
        .message-card:hover { box-shadow: var(--shadow-md); }
        .message-card.unread {
            border-left: 4px solid #7c3aed;
            background: #faf5ff;
        }
        .message-card.unread .message-stripe { background: linear-gradient(180deg, #7c3aed, #a78bfa); }
        .message-card.read   .message-stripe { background: linear-gradient(180deg, #d1d5db, #e5e7eb); }

        .message-stripe {
            width: 4px;
            flex-shrink: 0;
            border-radius: 4px;
            align-self: stretch;
        }

        .message-body { flex: 1; min-width: 0; }

        .message-sender {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .sender-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.9rem;
            flex-shrink: 0;
        }
        .sender-name {
            font-weight: 800; font-size: 1rem;
            color: var(--color-text-primary);
        }
        .unread-dot {
            width: 8px; height: 8px;
            background: #7c3aed;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .read-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em;
            text-transform: uppercase;
            background: #f3f4f6; color: #9ca3af;
            padding: 2px 8px; border-radius: 20px;
        }

        .message-meta {
            font-size: 0.78rem; color: #9ca3af;
            display: flex; align-items: center; gap: 0.75rem;
            margin-bottom: 0.9rem; flex-wrap: wrap;
        }
        .message-meta .meta-item {
            display: flex; align-items: center; gap: 4px;
        }

        .message-text {
            font-size: 0.92rem;
            color: var(--color-text-primary);
            line-height: 1.7;
            background: #f9fafb;
            border-radius: 8px;
            padding: 0.85rem 1rem;
            border-left: 3px solid #e5e7eb;
            white-space: pre-wrap;
        }

        .message-actions {
            display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap;
        }
        .btn-mark-read {
            padding: 5px 14px;
            background: #ede9fe; color: #6d28d9;
            border: none; border-radius: 6px;
            font-size: 0.78rem; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: background 0.15s;
        }
        .btn-mark-read:hover { background: #ddd6fe; }
        .btn-delete-msg {
            padding: 5px 14px;
            background: #fee2e2; color: #991b1b;
            border: none; border-radius: 6px;
            font-size: 0.78rem; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: background 0.15s;
        }
        .btn-delete-msg:hover { background: #fecaca; }

        .stats-row {
            display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
        }
        .stat-chip {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.82rem; font-weight: 700;
        }
        .stat-chip.unread { background: #ede9fe; color: #6d28d9; }
        .stat-chip.total  { background: #f3f4f6; color: #374151; }

        .empty-state {
            text-align: center; padding: 4rem 1rem;
            color: var(--color-text-secondary);
        }

        .admin-toast {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            background: #1f2937; color: #fff;
            padding: 0.65rem 1.25rem; border-radius: 8px;
            font-size: 0.85rem; z-index: 9999;
            opacity: 0; transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }
        .admin-toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
<div class="container-fluid px-4 py-3">

    <div th:replace="navigation/index :: topbar"></div>

    <div class="row align-items-stretch">
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>

        <div class="col besides">

            <div class="d-flex align-items-center gap-3 mb-3 page-header page-title">
                <div>
                    <h2 class="fw-bold mb-0">Contact Messages</h2>
                    <p class="text-muted small mb-0"
                       th:text="${messages.size()} + ' messages received'">Messages</p>
                </div>
            </div>

            <div class="stats-row" id="statsRow">
                <span class="stat-chip total">
                    <i class="bi bi-envelope"></i>
                    <span th:text="${messages.size()} + ' total'">0 total</span>
                </span>
                <span class="stat-chip unread" id="unreadChip" th:if="${unreadCount > 0}">
                    <i class="bi bi-circle-fill" style="font-size:0.55rem;"></i>
                    <span id="unreadChipText" th:text="${unreadCount} + ' unread'">0 unread</span>
                </span>
            </div>

            <div th:if="${messages.isEmpty()}" class="empty-state">
                <i class="bi bi-envelope-open" style="font-size:2.5rem;opacity:0.25;"></i>
                <p class="mt-3 fw-semibold">No messages yet</p>
                <p class="small text-muted">When visitors send messages through the contact form, they'll appear here.</p>
            </div>

            <div class="d-flex flex-column gap-3" th:if="${!messages.isEmpty()}">
                <div th:each="msg : ${messages}"
                     th:id="'msg-' + ${msg.id}"
                     th:class="${msg.read} ? 'message-card read' : 'message-card unread'">

                    <div th:class="${msg.read} ? 'message-stripe read' : 'message-stripe unread'"></div>

                    <div class="message-body">
                        <div class="message-sender">
                            <div class="sender-avatar"
                                 th:text="${msg.name != null and !msg.name.isEmpty()} ? ${msg.name.substring(0,1).toUpperCase()} : '?'">A</div>
                            <div>
                                <div class="sender-name" th:text="${msg.name}">Name</div>
                            </div>
                            <div class="unread-dot" th:if="${!msg.read}"></div>
                            <span class="read-badge" th:if="${msg.read}">
                                <i class="bi bi-check2"></i> Read
                            </span>
                        </div>

                        <div class="message-meta">
                            <span class="meta-item">
                                <i class="bi bi-envelope"></i>
                                <a th:href="'mailto:' + ${msg.email}" th:text="${msg.email}"
                                   style="color:inherit;text-decoration:none;">email</a>
                            </span>
                            <span class="meta-item" th:if="${msg.phone != null and !msg.phone.isEmpty()}">
                                <i class="bi bi-telephone"></i>
                                <span th:text="${msg.phone}">phone</span>
                            </span>
                            <span class="meta-item">
                                <i class="bi bi-clock"></i>
                                <span th:text="${#temporals.format(msg.sentAt, 'MMM dd, yyyy · HH:mm')}">date</span>
                            </span>
                        </div>

                        <div class="message-text" th:text="${msg.message}">Message content here.</div>

                        <div class="message-actions">
                            <button class="btn-mark-read"
                                    th:if="${!msg.read}"
                                    th:data-id="${msg.id}"
                                    onclick="markRead(this)">
                                <i class="bi bi-check2-circle me-1"></i>Mark as read
                            </button>
                            <button class="btn-delete-msg"
                                    th:data-id="${msg.id}"
                                    onclick="openDeleteModal(this)">
                                <i class="bi bi-trash me-1"></i>Delete
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div th:replace="footer/index :: footer"></div>
</div>

<!-- ══════════ DELETE CONFIRMATION MODAL ══════════ -->
<!-- Same style as friends/index.html remove dialog -->
<div id="deleteMessageDialog"
     style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4);
            z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:1rem; padding:2rem; max-width:380px;
                width:90%; box-shadow:0 10px 30px rgba(0,0,0,0.15); text-align:center;">
        <div style="width:52px;height:52px;border-radius:50%;background:#fee2e2;
                    display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
            <i class="bi bi-trash" style="color:#dc2626;font-size:1.4rem;"></i>
        </div>
        <div style="font-weight:700;font-size:1rem;margin-bottom:0.4rem;">Delete Message</div>
        <div style="font-size:0.88rem;color:#6b7280;margin-bottom:1.5rem;">
            Are you sure you want to delete this message? This cannot be undone.
        </div>
        <div style="display:flex;gap:0.75rem;justify-content:center;">
            <button onclick="closeDeleteModal()"
                    style="padding:0.5rem 1.25rem;border:1px solid #e5e7eb;border-radius:0.75rem;
                           background:white;font-family:inherit;font-size:0.88rem;font-weight:600;cursor:pointer;">
                Cancel
            </button>
            <button id="confirmDeleteMsgBtn"
                    style="padding:0.5rem 1.25rem;border:none;border-radius:0.75rem;
                           background:#dc2626;color:white;font-family:inherit;font-size:0.88rem;font-weight:600;cursor:pointer;">
                Delete
            </button>
        </div>
    </div>
</div>

<div class="admin-toast" id="adminToast"></div>

<script th:src="@{/js/script.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ── Toast ─────────────────────────────────────────────────────────────────
    function showToast(msg, isError) {
        const t = document.getElementById('adminToast');
        t.textContent = msg;
        t.style.background = isError ? '#991b1b' : '#166534';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ── Mark as read ──────────────────────────────────────────────────────────
    async function markRead(btn) {
        const id = btn.dataset.id;
        try {
            const res  = await fetch(`/admin/messages/${id}/read`, { method: 'POST' });
            const data = await res.json();
            if (!res.ok) { showToast(data.message, true); return; }

            const card = document.getElementById('msg-' + id);
            card.classList.remove('unread');
            card.classList.add('read');
            card.querySelector('.message-stripe').classList.remove('unread');
            card.querySelector('.message-stripe').classList.add('read');

            const dot = card.querySelector('.unread-dot');
            if (dot) dot.remove();
            const senderWrap = card.querySelector('.message-sender');
            const badge = document.createElement('span');
            badge.className = 'read-badge';
            badge.innerHTML = '<i class="bi bi-check2"></i> Read';
            senderWrap.appendChild(badge);
            btn.remove();

            const chip     = document.getElementById('unreadChip');
            const chipText = document.getElementById('unreadChipText');
            if (chip && chipText) {
                const next = (parseInt(chipText.textContent) || 1) - 1;
                if (next <= 0) chip.remove();
                else chipText.textContent = next + ' unread';
            }

            showToast('Marked as read', false);
        } catch (e) { showToast('Request failed', true); }
    }

    // ── Delete modal ──────────────────────────────────────────────────────────
    let pendingDeleteMsgId = null;
    const deleteDialog     = document.getElementById('deleteMessageDialog');

    function openDeleteModal(btn) {
        pendingDeleteMsgId = btn.dataset.id;
        deleteDialog.style.display = 'flex';
    }

    function closeDeleteModal() {
        pendingDeleteMsgId = null;
        deleteDialog.style.display = 'none';
    }

    // Close on backdrop click
    deleteDialog.addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });

    // Close on Escape
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeDeleteModal();
    });

    document.getElementById('confirmDeleteMsgBtn').addEventListener('click', async () => {
        if (!pendingDeleteMsgId) return;
        const id = pendingDeleteMsgId;
        closeDeleteModal();
        try {
            const res  = await fetch(`/admin/messages/${id}`, { method: 'DELETE' });
            const data = await res.json();
            if (!res.ok) { showToast(data.message, true); return; }
            document.getElementById('msg-' + id).remove();
            showToast('Message deleted', false);
        } catch (e) { showToast('Request failed', true); }
    });
</script>
</body>
</html>
