<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Oversight – PrepHunt Admin</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #FFF9F9;
            font-family: 'Gabarito', sans-serif;
        }
        .search-bar { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
        .search-bar input {
            padding: 0.45rem 0.85rem;
            border: 1.5px solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            font-family: inherit;
            width: 280px;
        }
        .search-bar input:focus { outline: none; border-color: #7c3aed; }

        .courses-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            font-size: 0.88rem;
        }
        .courses-table th {
            background: #f9fafb;
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-secondary);
            border-bottom: 1px solid var(--color-border);
        }
        .courses-table td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid #f3f4f6;
            vertical-align: middle;
        }
        .courses-table tr:last-child td { border-bottom: none; }
        .courses-table tr:hover td { background: #fafafa; }

        .course-name { font-weight: 600; color: var(--color-primary); }
        .course-desc {
            font-size: 0.78rem;
            color: var(--color-text-secondary);
            max-width: 260px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .count-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 9px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #f3f4f6;
            color: #374151;
        }
        .btn-delete {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            background: #fee2e2;
            color: #991b1b;
            transition: background 0.15s;
        }
        .btn-delete:hover { background: #fecaca; }

        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--color-text-secondary); }

        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .confirm-overlay.show { display: flex; }
        .confirm-box {
            background: #fff;
            border-radius: 14px;
            padding: 1.75rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
        }
        .confirm-box h3 { font-size: 1.05rem; font-weight: 700; margin: 0 0 0.5rem; }
        .confirm-box p  { font-size: 0.88rem; color: var(--color-text-secondary); margin: 0 0 1.25rem; }
        .confirm-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
        .btn-cancel-confirm {
            padding: 0.5rem 1rem; background: #f3f4f6; border: none;
            border-radius: 8px; font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .btn-cancel-confirm:hover { background: #e5e7eb; }
        .btn-confirm-delete {
            padding: 0.5rem 1rem; background: #dc2626; color: #fff; border: none;
            border-radius: 8px; font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .btn-confirm-delete:hover { background: #b91c1c; }

        .admin-toast {
            position: fixed;
            bottom: 1.5rem; right: 1.5rem;
            background: #1f2937; color: #fff;
            padding: 0.65rem 1.25rem;
            border-radius: 8px; font-size: 0.85rem;
            z-index: 9999; opacity: 0; transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s; pointer-events: none;
        }
        .admin-toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
<div class="container-fluid px-4 py-3">

    <div th:replace="navigation/index :: topbar"></div>

    <div class="row align-items-stretch">
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>

        <div class="col besides">

            <div class="d-flex align-items-center gap-3 mb-4 page-header page-title">
                <div>
                    <h2 class="fw-bold mb-0">Course Oversight</h2>
                    <p class="text-muted small mb-0" th:text="${courses.size()} + ' course(s) on platform'">Courses</p>
                </div>
            </div>

            <div class="search-bar">
                <input type="text" id="courseSearch" placeholder="Search by course or teacher…"
                       oninput="filterCourses(this.value)">
            </div>

            <div th:if="${courses.isEmpty()}" class="empty-state">
                <i class="bi bi-journal-x" style="font-size:2.5rem;opacity:0.3;"></i>
                <p class="mt-2">No courses on the platform yet.</p>
            </div>

            <table class="courses-table" th:if="${!courses.isEmpty()}" id="coursesTable">
                <thead>
                <tr>
                    <th>Course</th>
                    <th>Teacher</th>
                    <th>Chapters</th>
                    <th>Enrolled</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="course : ${courses}"
                    th:id="'course-row-' + ${course.courseId}"
                    th:data-search="${#strings.toLowerCase(course.courseName) + ' ' + #strings.toLowerCase(course.teacherName) + ' ' + #strings.toLowerCase(course.teacherEmail)}">
                    <td>
                        <div class="course-name" th:text="${course.courseName}">Course</div>
                        <div class="course-desc" th:text="${course.courseDesc}">Description</div>
                    </td>
                    <td>
                        <div th:text="${course.teacherName}">Teacher</div>
                        <div style="font-size:0.75rem;color:var(--color-text-secondary);"
                             th:text="${course.teacherEmail}">email</div>
                    </td>
                    <td>
                            <span class="count-pill">
                                <i class="bi bi-collection"></i>
                                <span th:text="${course.chapterCount}">0</span>
                            </span>
                    </td>
                    <td>
                            <span class="count-pill">
                                <i class="bi bi-person-check"></i>
                                <span th:text="${course.enrollmentCount}">0</span>
                            </span>
                    </td>
                    <td>
                        <button class="btn-delete"
                                th:data-id="${course.courseId}"
                                th:data-name="${course.courseName}"
                                onclick="confirmDelete(this)">
                            <i class="bi bi-trash3"></i> Delete
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

    <div th:replace="footer/index :: footer"></div>
</div>

<div class="confirm-overlay" id="confirmOverlay" onclick="handleOverlayClick(event)">
    <div class="confirm-box">
        <h3>Delete course?</h3>
        <p id="confirmMsg">This will permanently delete the course and all its chapters, resources and tests.</p>
        <div class="confirm-actions">
            <button class="btn-cancel-confirm" onclick="closeConfirm()">Cancel</button>
            <button class="btn-confirm-delete" onclick="executeDelete()">Delete</button>
        </div>
    </div>
</div>

<div class="admin-toast" id="adminToast"></div>

<script th:src="@{/js/script.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let pendingDeleteId = null;

    function showToast(msg, isError) {
        const t = document.getElementById('adminToast');
        t.textContent = msg;
        t.style.background = isError ? '#991b1b' : '#1f2937';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    function confirmDelete(btn) {
        pendingDeleteId = btn.dataset.id;
        document.getElementById('confirmMsg').textContent =
            `"${btn.dataset.name}" and all its chapters, resources and tests will be permanently deleted.`;
        document.getElementById('confirmOverlay').classList.add('show');
    }

    function closeConfirm() {
        document.getElementById('confirmOverlay').classList.remove('show');
        pendingDeleteId = null;
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('confirmOverlay')) closeConfirm();
    }

    async function executeDelete() {
        if (!pendingDeleteId) return;
        const id = pendingDeleteId;
        closeConfirm();
        try {
            const res  = await fetch(`/admin/courses/${id}`, { method: 'DELETE' });
            const data = await res.json();
            if (!res.ok) { showToast(data.message, true); return; }
            const row = document.getElementById('course-row-' + id);
            if (row) row.remove();
            showToast(data.message, false);
        } catch (e) { showToast('Request failed', true); }
    }

    function filterCourses(query) {
        const q = query.toLowerCase();
        document.querySelectorAll('#coursesTable tbody tr').forEach(row => {
            row.style.display = (row.dataset.search || '').includes(q) ? '' : 'none';
        });
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeConfirm(); });
</script>
</body>
</html>
