<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – PrepHunt</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #FFF9F9;
            font-family: 'Gabarito', sans-serif;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem 1.25rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .stat-card .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.25rem;
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            color: var(--color-primary);
        }
        .stat-card .stat-label {
            font-size: 0.82rem;
            color: var(--color-text-secondary);
            font-weight: 500;
        }
        .icon-purple { background: #ede9fe; color: #7c3aed; }
        .icon-blue   { background: #dbeafe; color: #1d4ed8; }
        .icon-green  { background: #dcfce7; color: #15803d; }
        .icon-amber  { background: #fef3c7; color: #b45309; }
        .icon-rose   { background: #ffe4e6; color: #be123c; }
        .icon-teal   { background: #ccfbf1; color: #0f766e; }

        .admin-quick-links { display: flex; gap: 1rem; flex-wrap: wrap; }
        .quick-link-card {
            flex: 1;
            min-width: 220px;
            background: #fff;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: box-shadow 0.15s, border-color 0.15s;
        }
        .quick-link-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: #a5b4fc; color: inherit; }
        .quick-link-card .ql-icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 1.3rem;
        }
        .quick-link-card .ql-title { font-weight: 600; font-size: 0.95rem; }
        .quick-link-card .ql-sub   { font-size: 0.78rem; color: var(--color-text-secondary); margin-top: 1px; }
    </style>
</head>
<body>
<div class="container-fluid px-4 py-3">

    <div th:replace="navigation/index :: topbar"></div>

    <div class="row align-items-stretch">
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>

        <div class="col besides">

            <div class="d-flex align-items-center gap-3 mb-4 page-header page-title">
                <div>
                    <h2 class="fw-bold mb-0">Admin Dashboard</h2>
                    <p class="text-muted small mb-0">Platform overview at a glance</p>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-icon icon-purple"><i class="bi bi-people-fill"></i></div>
                    <div class="stat-value" th:text="${stats.totalUsers}">0</div>
                    <div class="stat-label">Total users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-blue"><i class="bi bi-person-fill"></i></div>
                    <div class="stat-value" th:text="${stats.totalStudents}">0</div>
                    <div class="stat-label">Students</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-green"><i class="bi bi-person-workspace"></i></div>
                    <div class="stat-value" th:text="${stats.totalTeachers}">0</div>
                    <div class="stat-label">Teachers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-amber"><i class="bi bi-journal-richtext"></i></div>
                    <div class="stat-value" th:text="${stats.totalCourses}">0</div>
                    <div class="stat-label">Courses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-rose"><i class="bi bi-person-check-fill"></i></div>
                    <div class="stat-value" th:text="${stats.totalEnrollments}">0</div>
                    <div class="stat-label">Enrollments</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-teal"><i class="bi bi-clipboard2-check-fill"></i></div>
                    <div class="stat-value" th:text="${stats.totalTests}">0</div>
                    <div class="stat-label">Tests created</div>
                </div>
            </div>

            <h5 class="fw-semibold mb-3">Quick access</h5>
            <div class="admin-quick-links">
                <a href="/admin/users" class="quick-link-card">
                    <div class="ql-icon icon-purple"><i class="bi bi-people"></i></div>
                    <div>
                        <div class="ql-title">User Management</div>
                        <div class="ql-sub">View, deactivate, change roles</div>
                    </div>
                </a>
                <a href="/admin/courses" class="quick-link-card">
                    <div class="ql-icon icon-amber"><i class="bi bi-collection"></i></div>
                    <div>
                        <div class="ql-title">Course Oversight</div>
                        <div class="ql-sub">View and delete any course</div>
                    </div>
                </a>
            </div>

        </div>
    </div>

    <div th:replace="footer/index :: footer"></div>
</div>
<script th:src="@{/js/script.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
