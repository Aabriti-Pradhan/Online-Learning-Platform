<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Test</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #FFF9F9;
            font-family: 'Gabarito', sans-serif;
        }
    </style>
</head>

<body>

<div class="container-fluid px-4 py-3">

    <div th:replace="navigation/index :: topbar"></div>

    <div class="row align-items-stretch">

        <!-- SIDEBAR -->
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col ms-4">

            <div class="d-flex justify-content-between align-items-center mb-4 page-header page-title">
                <h2 class="fw-bold">Create Test</h2>
            </div>

            <section class="hero-section">
                <h3 class="page-title">Your test, your rules.</h3>
                <button class="btn-primary" onclick="openTestModal()">
                    Create New Test
                </button>
            </section>

            <div class="section-header">
                <h4 class="page-title"><i class="bi bi-file-earmark-minus"></i> Previously Created Tests</h4>
            </div>

            <!-- RESOURCE GRID -->
            <div class="d-flex flex-wrap gap-4">

                <!-- duplicate cards -->
                <div th:each="i : ${#numbers.sequence(1,8)}">
                    <div class="test-card" onclick="window.location.href='/test/1'">
                        <div class="test-card-icon">
                            <i class="bi bi-file-earmark-text"></i>
                            <i class="bi bi-list fs-3"></i>
                        </div>
                        <div class="test-card-content">
                            <h4 class="test-title">Test Title</h4>
                            <div class="test-meta">
                                <span class="test-attempts">No attempts so far</span>
                                <span class="test-difficulty easy">Easy</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="footer/index :: footer"></div>

</div>

<!-- CREATE TEST MODAL -->
<div class="modal-overlay" id="testModal">
    <div class="test-modal">
        <!-- Modal Header -->
        <div class="modal-header-custom">
            <div class="modal-title-section">
                <input type="text" class="modal-title-input" placeholder="Test Title" id="testTitle">
            </div>
            <div class="modal-controls">
                <!-- Difficulty Dropdown -->
                <div class="difficulty-dropdown">
                    <div class="difficulty-btn" onclick="toggleDropdown('difficultyDropdown')">
                        <span class="difficulty-indicator easy" id="difficultyIndicator"></span>
                        <span id="difficultyText">Easy</span>
                        <i class="bi bi-chevron-down"></i>
                    </div>
                    <div class="dropdown-menu-custom" id="difficultyDropdown">
                        <div class="dropdown-item-custom" onclick="setDifficulty('easy')">
                            <span class="difficulty-indicator easy"></span>
                            Easy
                        </div>
                        <div class="dropdown-item-custom" onclick="setDifficulty('medium')">
                            <span class="difficulty-indicator medium"></span>
                            Medium
                        </div>
                        <div class="dropdown-item-custom" onclick="setDifficulty('hard')">
                            <span class="difficulty-indicator hard"></span>
                            Hard
                        </div>
                    </div>
                </div>

                <!-- Course Dropdown -->
                <div class="course-dropdown">
                    <div class="course-btn" onclick="toggleDropdown('courseDropdown')">
                        <span id="courseText">Choose a course</span>
                        <i class="bi bi-chevron-down"></i>
                    </div>
                    <div class="dropdown-menu-custom" id="courseDropdown">
                        <div class="dropdown-item-custom" onclick="setCourse('Course A')">Course A</div>
                        <div class="dropdown-item-custom" onclick="setCourse('Course B')">Course B</div>
                        <div class="dropdown-item-custom" onclick="setCourse('Course C')">Course C</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Body -->
        <div class="modal-body-custom" id="questionsContainer">
            <!-- Questions will be added here dynamically -->
        </div>

        <!-- Modal Footer -->
        <div class="modal-footer-custom">
            <!-- Add Question Button -->
            <button class="add-question-btn" onclick="addQuestion()">
                <i class="bi bi-plus-circle" style="font-size: 20px;"></i>
                Another Question
            </button>
            <button class="btn-modal btn-discard" onclick="closeTestModal()">
                <i class="bi bi-trash"></i>
                Discard
            </button>
            <button class="btn-modal btn-save" onclick="saveTest()">
                <i class="bi bi-save"></i>
                Save
            </button>
        </div>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>

</body>
</html>
