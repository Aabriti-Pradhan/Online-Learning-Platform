<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>PrepHunt</title>
        <link rel="icon" type="image/png" href="/images/logo.png">
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <link rel="stylesheet" th:href="@{/css/styles.css}">
    </head>

    <body style="
            background-color: #FFF9F9;
            background-image: url('/images/login-image.png');
            background-position: right center;
            background-repeat: no-repeat;
            background-size: auto 70%;
            height: 100vh;">

        <div th:replace="navbar/index :: navbar"></div>

        <div class="container d-flex justify-content-left align-items-center"
             style="min-height: calc(100vh - 200px);">
            <div class="p-4" style="width: 780px;">

                <h1 class="text-left mb-4">Notes, tests, progress — all in one vibe.</h1>
<!--                <h3 class="text-secondary">Your all-in-one study hub for notes, tests, tags, and total exam domination.</h3>-->

                <!-- Error message -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/register}" th:object="${registerDTO}" method="post" style="width: 50%">
                    <div class="mb-3 mt-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control bg-transparent border-0 border-bottom rounded-0" id="username" name="username"
                               placeholder="Enter username" th:value="${registerDTO.username}" required>
                        <div th:if="${#fields.hasErrors('username')}" class="text-danger small">
                            <span th:errors="*{username}"></span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input class="form-control bg-transparent border-0 border-bottom rounded-0" id="email" name="email"
                               placeholder="Enter email" th:value="${registerDTO.email}" required>
                        <div th:if="${#fields.hasErrors('email')}" class="text-danger small">
                            <span th:errors="*{email}"></span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="position-relative">
                            <input type="password" class="form-control bg-transparent border-0 border-bottom rounded-0" id="password" name="password" required>
                            <i class="bi bi-eye toggle-password position-absolute top-50 end-0 translate-middle-y me-3"
                               style="cursor: pointer;" data-target="password"></i>
                        </div>
                        <div th:if="${#fields.hasErrors('password')}" class="text-danger small">
                            <span th:errors="*{password}"></span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="position-relative">
                            <input type="password" class="form-control bg-transparent border-0 border-bottom rounded-0" id="confirmPassword" name="confirmPassword" required>
                            <i class="bi bi-eye toggle-password position-absolute top-50 end-0 translate-middle-y me-3"
                               style="cursor: pointer;" data-target="confirmPassword"></i>
                        </div>
                        <div th:if="${#fields.hasErrors('confirmPassword')}" class="text-danger small">
                            <span th:errors="*{confirmPassword}"></span>
                        </div>
                    </div>

<!--                    <div class="mb-3">-->
<!--                        <label for="role" class="form-label">Select Role</label>-->
<!--                        <select class="form-select bg-transparent border-0 border-bottom rounded-0" id="role" name="role" required>-->
<!--                            <option value="" disabled selected>Choose role</option>-->
<!--                            <option value="STUDENT" th:selected="${registerDTO.role=='STUDENT'}">Student</option>-->
<!--                            <option value="TEACHER" th:selected="${registerDTO.role=='TEACHER'}">Teacher</option>-->
<!--                        </select>-->
<!--                        <div th:if="${#fields.hasErrors('role')}" class="text-danger small">-->
<!--                            <span th:errors="*{role}"></span>-->
<!--                        </div>-->
<!--                    </div>-->

                    <button type="submit" class="btn btn-dark w-50">
                        Register
                    </button>

                    <a href="/oauth2/authorization/google" class="btn btn-outline-dark w-50 mt-2">
                        <i class="bi bi-google"></i> Register with Google
                    </a>

                    <div class="text-left mt-3">
                        <small>Already have an account?
                            <a th:href="@{/login}">Login Here</a>
                        </small>
                    </div>
                </form>

            </div>
        </div>

        <div th:replace="footer/index :: footer"></div>

        <script>
            document.querySelectorAll(".toggle-password").forEach(toggle => {
                toggle.addEventListener("click", () => {
                    const targetId = toggle.getAttribute("data-target");
                    const input = document.getElementById(targetId);
                    const isHidden = input.type === "password";
                    input.type = isHidden ? "text" : "password";
                    toggle.classList.toggle("bi-eye");
                    toggle.classList.toggle("bi-eye-slash");
                });
            });
        </script>
    </body>
</html>
