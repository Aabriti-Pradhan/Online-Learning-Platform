<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register — PrepHunt</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #FFF9F9;
            background-image: url('/images/login-image.png');
            background-position: right center;
            background-repeat: no-repeat;
            background-size: auto 70%;
            min-height: 100vh;
            font-family: 'Gabarito', sans-serif;
            margin: 0;
        }

        /* Navbar */
        .site-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.25rem 2rem;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 0.6rem;
            font-size: 1.3rem; font-weight: 800; color: #1a1a1a; text-decoration: none;
        }
        .nav-brand img { height: 44px; }
        .nav-pill {
            display: flex; align-items: center;
            background: #1a1a1a; border-radius: 10px;
            padding: 0.4rem 1.25rem; gap: 0.1rem;
        }
        .nav-pill a {
            color: rgba(255,255,255,0.8); text-decoration: none;
            padding: 0.35rem 0.9rem; border-radius: 50px;
            font-size: 0.88rem; font-weight: 500;
            transition: color 0.2s, background 0.2s;
        }
        .nav-pill a:hover { color: #fff; background: rgba(255,255,255,0.12); }
        .btn-nav {
            background: #1a1a1a; color: white; border: none;
            border-radius: 10px; padding: 0.5rem 1.3rem;
            font-size: 0.88rem; font-weight: 700;
            text-decoration: none; transition: background 0.2s;
        }
        .btn-nav:hover { background: #333; color: white; }

        /* Form area */
        .form-wrap {
            padding: 2rem 2rem 3rem 4rem;
            max-width: 520px;
        }
        .form-headline { font-size: 2rem; font-weight: 900; color: #1a1a1a; margin-bottom: 0.4rem; }
        .form-subline  { color: #6b7280; font-size: 0.95rem; margin-bottom: 2rem; }

        .form-label-custom { font-size: 0.88rem; font-weight: 600; color: #374151; margin-bottom: 0.3rem; display: block; }
        .form-input {
            width: 100%; padding: 0.65rem 0;
            background: transparent; border: none;
            border-bottom: 1.5px solid #e5e7eb;
            font-size: 0.95rem; font-family: inherit;
            outline: none; transition: border-color 0.2s;
            color: #1a1a1a;
        }
        .form-input:focus { border-bottom-color: #4a7c59; }
        .form-input::placeholder { color: #9ca3af; }
        .form-input.is-invalid { border-bottom-color: #dc2626; }

        .field-error {
            color: #dc2626; font-size: 0.78rem; margin-top: 0.25rem;
            display: flex; align-items: center; gap: 0.3rem;
        }

        .input-group-wrap { position: relative; margin-bottom: 1.25rem; }
        .toggle-eye {
            position: absolute; right: 0; top: 60%; transform: translateY(-50%);
            cursor: pointer; color: #9ca3af; font-size: 1rem;
        }
        .toggle-eye:hover { color: #374151; }

        .btn-submit {
            width: 55%; padding: 0.75rem;
            background: #1a1a1a; color: white; border: none;
            border-radius: 10px; font-size: 0.95rem; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-submit:hover { background: #333; transform: translateY(-1px); }

        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 1rem; width: 55%;
            padding: 0.65rem 1rem;
            background: #ffffff; border: 1.5px solid #dadce0; border-radius: 10px;
            font-size: 0.9rem; font-weight: 600; color: #3c4043; text-decoration: none;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .google-btn:hover { background: #f7f8f8; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .google-icon { width: 18px; height: 18px; }

        /* Toast */
        .error-toast {
            position: fixed; bottom: 1.5rem; left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: #991b1b; color: #fff;
            padding: 0.75rem 1.75rem; border-radius: 10px;
            font-size: 0.88rem; font-family: inherit;
            z-index: 9999; opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none; white-space: nowrap;
            display: flex; align-items: center; gap: 0.5rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .error-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .no-page-margin{
            margin-left: 0 !important;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="site-navbar">
    <a class="nav-brand" href="/">
        <img src="/images/logo.png" alt="PrepHunt">
        PrepHunt
    </a>
    <div class="nav-pill">
        <a href="/#about">About</a>
        <a href="/#services">Services</a>
        <a href="/#contact">Contact</a>
        <a href="/repository">Courses</a>
    </div>
    <a class="btn-nav" href="/login">Log in</a>
</nav>

<div class="form-wrap">
    <h1 class="form-headline">Create your account.</h1>
    <p class="form-subline">Join PrepHunt and start studying smarter.</p>

    <!--
        Note: th:object requires the registerDTO model attribute.
        The RegisterController already adds it via model.addAttribute("registerDTO", ...)
        Validation errors render inline below each field — no broken banner.
    -->
    <form th:action="@{/register}" th:object="${registerDTO}" method="post">

        <div class="input-group-wrap">
            <label class="form-label-custom" for="username">Username</label>
            <input class="form-input" th:classappend="${#fields.hasErrors('username')} ? ' is-invalid' : ''"
                   type="text" id="username" name="username"
                   placeholder="Choose a username"
                   th:value="${registerDTO.username}">
            <div th:if="${#fields.hasErrors('username')}" class="field-error">
                <i class="bi bi-exclamation-circle"></i>
                <span th:errors="*{username}">Error</span>
            </div>
        </div>

        <div class="input-group-wrap">
            <label class="form-label-custom" for="email">Email</label>
            <input class="form-input" th:classappend="${#fields.hasErrors('email')} ? ' is-invalid' : ''"
                   type="email" id="email" name="email"
                   placeholder="Enter your email"
                   th:value="${registerDTO.email}">
            <div th:if="${#fields.hasErrors('email')}" class="field-error">
                <i class="bi bi-exclamation-circle"></i>
                <span th:errors="*{email}">Error</span>
            </div>
        </div>

        <div class="input-group-wrap">
            <label class="form-label-custom" for="password">Password</label>
            <input class="form-input" th:classappend="${#fields.hasErrors('password')} ? ' is-invalid' : ''"
                   type="password" id="password" name="password"
                   placeholder="At least 6 characters">
            <i class="bi bi-eye toggle-eye" data-target="password" style="cursor:pointer;"></i>
            <div th:if="${#fields.hasErrors('password')}" class="field-error">
                <i class="bi bi-exclamation-circle"></i>
                <span th:errors="*{password}">Error</span>
            </div>
        </div>

        <div class="input-group-wrap">
            <label class="form-label-custom" for="confirmPassword">Confirm Password</label>
            <input class="form-input"
                   type="password" id="confirmPassword" name="confirmPassword"
                   placeholder="Repeat your password">
            <i class="bi bi-eye toggle-eye" data-target="confirmPassword" style="cursor:pointer;"></i>
        </div>

        <input type="hidden" name="role" th:value="${session.selectedRole}">

        <button type="submit" class="btn-submit">Register</button>

        <p style="margin-top:1rem; font-size:0.85rem; color:#9ca3af;">
            Already have an account?
            <a href="/login" style="color:#4a7c59; font-weight:700;">Log in</a>
        </p>
    </form>

    <a href="/oauth2/authorization/google" class="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon">
        Continue with Google
    </a>
</div>

<div th:replace="footer/index :: footer"></div>

<!-- Toast: shown when server sends back a non-field error (e.g. email taken, passwords mismatch) -->
<div class="error-toast" id="errorToast">
    <i class="bi bi-exclamation-circle"></i>
    <span id="errorMsg">An error occurred.</span>
</div>

<!-- Inject server error message into JS so we can show it as a toast -->
<script th:inline="javascript">
    const serverError = /*[[${error}]]*/ null;
    if (serverError) {
        const toast = document.getElementById('errorToast');
        document.getElementById('errorMsg').textContent = serverError;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 5000);
    }
</script>

<script>
    // Password toggle for both fields
    document.querySelectorAll('.toggle-eye').forEach(icon => {
        icon.addEventListener('click', function() {
            const targetId = this.getAttribute('data-target');
            const input    = document.getElementById(targetId);
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
    });
</script>
</body>
</html>
