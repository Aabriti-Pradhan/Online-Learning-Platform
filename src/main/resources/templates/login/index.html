<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — PrepHunt</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #FFF9F9;
            background-image: url('/images/login-image.png');
            background-position: right center;
            background-repeat: no-repeat;
            background-size: auto 70%;
            min-height: 100vh;
            font-family: 'Gabarito', sans-serif;
            margin: 0;
        }

        /* Navbar */
        .site-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.25rem 2rem;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 0.6rem;
            font-size: 1.3rem; font-weight: 800; color: #1a1a1a; text-decoration: none;
        }
        .nav-brand img { height: 44px; }
        .nav-pill {
            display: flex; align-items: center;
            background: #1a1a1a; border-radius: 10px;
            padding: 0.4rem 1.25rem; gap: 0.1rem;
        }
        .nav-pill a {
            color: rgba(255,255,255,0.8); text-decoration: none;
            padding: 0.35rem 0.9rem; border-radius: 50px;
            font-size: 0.88rem; font-weight: 500;
            transition: color 0.2s, background 0.2s;
        }
        .nav-pill a:hover { color: #fff; background: rgba(255,255,255,0.12); }
        .btn-nav {
            background: #1a1a1a; color: white; border: none;
            border-radius: 10px; padding: 0.5rem 1.3rem;
            font-size: 0.88rem; font-weight: 700;
            text-decoration: none; transition: background 0.2s;
        }
        .btn-nav:hover { background: #333; color: white; }

        /* Form area */
        .form-wrap {
            padding: 3rem 2rem 3rem 4rem;
            max-width: 520px;
        }
        .form-headline { font-size: 2rem; font-weight: 900; color: #1a1a1a; margin-bottom: 0.4rem; }
        .form-subline  { color: #6b7280; font-size: 0.95rem; margin-bottom: 2rem; }

        .form-label-custom { font-size: 0.88rem; font-weight: 600; color: #374151; margin-bottom: 0.3rem; display: block; }
        .form-input {
            width: 100%; padding: 0.65rem 0;
            background: transparent; border: none;
            border-bottom: 1.5px solid #e5e7eb;
            font-size: 0.95rem; font-family: inherit;
            outline: none; transition: border-color 0.2s;
            color: #1a1a1a;
        }
        .form-input:focus { border-bottom-color: #4a7c59; }
        .form-input::placeholder { color: #9ca3af; }
        .input-group-wrap { position: relative; margin-bottom: 1.5rem; }
        .toggle-eye {
            position: absolute; right: 0; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #9ca3af; font-size: 1rem;
        }
        .toggle-eye:hover { color: #374151; }

        .btn-submit {
            width: 55%; padding: 0.75rem;
            background: #1a1a1a; color: white; border: none;
            border-radius: 10px; font-size: 0.95rem; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-submit:hover { background: #333; transform: translateY(-1px); }

        .google-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 1rem; width: 55%;
            padding: 0.65rem 1rem;
            background: #ffffff; border: 1.5px solid #dadce0; border-radius: 10px;
            font-size: 0.9rem; font-weight: 600; color: #3c4043; text-decoration: none;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .google-btn:hover { background: #f7f8f8; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .google-icon { width: 18px; height: 18px; }

        /* Toast */
        .error-toast {
            position: fixed; bottom: 1.5rem; left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: #991b1b; color: #fff;
            padding: 0.75rem 1.75rem; border-radius: 10px;
            font-size: 0.88rem; font-family: inherit;
            z-index: 9999; opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none; white-space: nowrap;
            display: flex; align-items: center; gap: 0.5rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .error-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .success-toast {
            position: fixed; bottom: 1.5rem; left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: #166534; color: #fff;
            padding: 0.75rem 1.75rem; border-radius: 10px;
            font-size: 0.88rem; font-family: inherit;
            z-index: 9999; opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none; white-space: nowrap;
            display: flex; align-items: center; gap: 0.5rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .success-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .no-page-margin{
            margin-left: 0 !important;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="site-navbar">
    <a class="nav-brand" href="/">
        <img src="/images/logo.png" alt="PrepHunt">
        PrepHunt
    </a>
    <div class="nav-pill">
        <a href="/#about">About</a>
        <a href="/#services">Services</a>
        <a href="/#contact">Contact</a>
        <a href="/repository">Courses</a>
    </div>
    <a class="btn-nav" href="/select-role">Register</a>
</nav>

<div class="form-wrap">
    <h1 class="form-headline">Welcome back.</h1>
    <p class="form-subline">Log in to continue your learning journey.</p>

    <form th:action="@{/login}" method="post">
        <div class="input-group-wrap">
            <label class="form-label-custom" for="username">Email</label>
            <input class="form-input" type="email" id="username" name="username"
                   placeholder="Enter your email" required>
        </div>

        <div class="input-group-wrap">
            <label class="form-label-custom" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="Enter your password" required>
            <i class="bi bi-eye toggle-eye" id="togglePwd" style="cursor:pointer;"></i>
        </div>

        <button type="submit" class="btn-submit">Log in</button>

        <p style="margin-top:1rem; font-size:0.85rem; color:#9ca3af;">
            Don't have an account?
            <a href="/select-role" style="color:#4a7c59; font-weight:700;">Register</a>
        </p>
    </form>

    <a href="/oauth2/authorization/google?prompt=select_account" class="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon">
        Continue with Google
    </a>
</div>

<div th:replace="footer/index :: footer"></div>

<!-- Error toast (shown when Spring Security redirects back with ?error) -->
<div class="error-toast" id="errorToast">
    <i class="bi bi-exclamation-circle"></i>
    <span id="errorToastMsg">Invalid email or password. Please try again.</span>
</div>

<!-- Success toast (shown on ?success from register) -->
<div class="success-toast" id="successToast">
    <i class="bi bi-check-circle"></i>
    <span>Account created successfully! Please log in.</span>
</div>

<script>
    // Show error toast if Spring Security redirected with ?error
    const params = new URLSearchParams(window.location.search);
    if (params.has('error')) {
        const toast = document.getElementById('errorToast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 4000);
    }
    if (params.has('success')) {
        const toast = document.getElementById('successToast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // Password toggle
    document.getElementById('togglePwd').addEventListener('click', function() {
        const input = document.getElementById('password');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });
</script>
</body>
</html>
