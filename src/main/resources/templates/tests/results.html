<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Test Results — PrepHunt</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #FFF9F9; font-family: 'Gabarito', sans-serif; }
        .score-bar-bg { height: 8px; background: #f1f5f9; border-radius: 99px; flex: 1; }
        .score-bar-fill { height: 100%; border-radius: 99px; }
        .pass  { background: #059669; }
        .good  { background: #d97706; }
        .fail  { background: #dc2626; }
        .empty-state { text-align: center; padding: 4rem; color: var(--color-text-secondary); }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container-fluid px-4 py-3">
    <div th:replace="navigation/index :: topbar"></div>
    <div class="row align-items-stretch">
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>
        <div class="col ms-4">

            <div class="d-flex align-items-center mb-4 page-header gap-3">
                <div>
                    <h2 class="fw-bold mb-0" th:text="${test.testTitle} + ' — Results'">Results</h2>
                    <p class="text-muted small mb-0" th:text="${course.courseName}"></p>
                </div>
                <a th:href="@{'/your-courses/' + ${course.courseId} + '/chapters/' + ${chapter.chapterId} + '/tests'}"
                   class="btn btn-sm btn-outline-secondary rounded-2">
                    <i class="bi bi-arrow-left"></i>
                </a>
            </div>

            <!-- Summary stat cards -->
            <div class="d-flex gap-3 mb-4">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#ede9fe;color:#6c47ff;"><i class="bi bi-people"></i></div>
                    <div>
                        <div class="stat-value" th:text="${attemptResults.size()}">0</div>
                        <div class="stat-label">Attempts</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon test"><i class="bi bi-patch-question"></i></div>
                    <div>
                        <div class="stat-value" th:text="${questionCount}">0</div>
                        <div class="stat-label">Questions</div>
                    </div>
                </div>
            </div>

            <!-- Results table -->
            <div class="resource-table-wrap" th:if="${!attemptResults.isEmpty()}">
                <table class="table mb-0">
                    <thead>
                    <tr>
                        <th>Student</th>
                        <th>Score</th>
                        <th style="min-width:200px;">Performance</th>
                        <th class="text-end">Detail</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${attemptResults}">
                        <td>
                            <div class="fw-semibold small" th:text="${r.studentName}">Name</div>
                            <div style="font-size:0.75rem;color:#9ca3af;" th:text="${r.studentEmail}">email</div>
                        </td>
                        <td>
                            <span class="fw-bold" th:text="${r.score} + ' / ' + ${questionCount}">0/0</span>
                        </td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="score-bar-bg">
                                    <div class="score-bar-fill"
                                         th:with="pct=${questionCount > 0} ? ${r.score * 100 / questionCount} : 0"
                                         th:classappend="${pct >= 70} ? 'pass' : (${pct >= 50} ? 'good' : 'fail')"
                                         th:style="'width:' + ${pct} + '%'"></div>
                                </div>
                                <span style="font-size:0.78rem;font-weight:700;min-width:36px;"
                                      th:text="${questionCount > 0} ? ${r.score * 100 / questionCount} + '%' : '0%'"></span>
                            </div>
                        </td>
                        <td class="text-end">
                            <a th:href="@{'/your-courses/' + ${course.courseId} + '/chapters/' + ${chapter.chapterId} + '/tests/' + ${test.testId} + '/result/' + ${r.attemptId}}"
                               class="btn btn-sm btn-outline-secondary rounded-2">
                                <i class="bi bi-eye me-1"></i> View
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty-state" th:if="${attemptResults.isEmpty()}">
                <i class="bi bi-inbox"></i>
                <p class="fw-semibold">No attempts yet</p>
                <p class="small">Students haven't taken this test yet.</p>
            </div>

        </div>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
