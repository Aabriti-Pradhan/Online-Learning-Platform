<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Result — PrepHunt</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #FFF9F9; font-family: 'Gabarito', sans-serif; }
        .result-wrap { max-width: 720px; }

        /* Score hero */
        .score-card {
            background: white; border: 1px solid var(--color-border);
            border-radius: var(--radius-lg); padding: 2rem;
            box-shadow: var(--shadow-sm); text-align: center; margin-bottom: 1.5rem;
        }
        .score-ring {
            width: 120px; height: 120px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 0 auto 1rem; border: 6px solid;
            font-size: 2rem; font-weight: 800;
        }
        .score-ring.pass  { border-color: #059669; color: #059669; }
        .score-ring.fail  { border-color: #dc2626; color: #dc2626; }
        .score-ring.good  { border-color: #d97706; color: #d97706; }
        .score-label { font-size: 0.82rem; color: #9ca3af; font-weight: 600; }
        .score-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.25rem; }
        .score-sub   { font-size: 0.9rem; color: var(--color-text-secondary); }

        /* Question result cards */
        .qresult-card {
            background: white; border: 1px solid var(--color-border);
            border-radius: var(--radius-lg); padding: 1.25rem 1.5rem;
            box-shadow: var(--shadow-sm); margin-bottom: 0.85rem;
        }
        .qresult-card.correct-card { border-left: 4px solid #059669; }
        .qresult-card.wrong-card   { border-left: 4px solid #dc2626; }

        .q-header { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.9rem; }
        .result-icon {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; flex-shrink: 0; margin-top: 2px;
        }
        .result-icon.correct { background: #d1fae5; color: #059669; }
        .result-icon.wrong   { background: #fee2e2; color: #dc2626; }
        .q-text { font-size: 0.95rem; font-weight: 600; color: var(--color-text-primary); }

        .option-row {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.45rem 0.75rem; border-radius: var(--radius-sm);
            font-size: 0.88rem; margin-bottom: 4px;
        }
        .option-row.student-answer.wrong-ans { background: #fee2e2; color: #dc2626; }
        .option-row.correct-ans              { background: #d1fae5; color: #059669; font-weight: 700; }
        .option-row.correct-ans.also-selected { background: #d1fae5; color: #059669; font-weight: 700; }
        .opt-badge {
            width: 22px; height: 22px; border-radius: 50%; background: #f3f4f6;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700; color: #6b7280; flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="container-fluid px-4 py-3">
    <div th:replace="navigation/index :: topbar"></div>
    <div class="row align-items-stretch">
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>
        <div class="col ms-4">
            <div class="result-wrap">

                <!-- Breadcrumb + actions -->
                <div class="d-flex justify-content-between align-items-center mb-4 page-header">
                    <div>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb mb-1">
                                <li class="breadcrumb-item"><a th:href="@{'/your-courses/' + ${course.courseId} + '/tests/take'}">Tests</a></li>
                                <li class="breadcrumb-item active">Result</li>
                            </ol>
                        </nav>
                        <h2 class="fw-bold mb-0" th:text="${test.testTitle}">Test Title</h2>
                    </div>
                    <a th:href="@{'/your-courses/' + ${course.courseId} + '/tests/' + ${test.testId} + '/take'}"
                       class="btn btn-dark rounded-3">
                        <i class="bi bi-arrow-repeat me-1"></i> Retake
                    </a>
                </div>

                <!-- Score card -->
                <div class="score-card">
                    <div class="score-ring"
                         th:classappend="${pct >= 70} ? 'pass' : (${pct >= 50} ? 'good' : 'fail')">
                        <div th:text="${pct} + '%'">75%</div>
                        <div class="score-label">Score</div>
                    </div>
                    <div class="score-title"
                         th:text="${pct >= 70} ? 'Great job!' : (${pct >= 50} ? 'Almost there!' : 'Keep practising!')">
                    </div>
                    <div class="score-sub"
                         th:text="'You got ' + ${score} + ' out of ' + ${total} + ' questions correct.'">
                    </div>

                    <div class="d-flex justify-content-center gap-4 mt-3">
                        <div>
                            <div class="fw-bold fs-5 text-success" th:text="${score}">0</div>
                            <div style="font-size:0.78rem;color:#9ca3af;">Correct</div>
                        </div>
                        <div>
                            <div class="fw-bold fs-5 text-danger" th:text="${total - score}">0</div>
                            <div style="font-size:0.78rem;color:#9ca3af;">Wrong</div>
                        </div>
                        <div>
                            <div class="fw-bold fs-5" th:text="${total}">0</div>
                            <div style="font-size:0.78rem;color:#9ca3af;">Total</div>
                        </div>
                    </div>
                </div>

                <!-- Per-question breakdown -->
                <h6 class="fw-bold mb-3" style="font-size:0.82rem;text-transform:uppercase;letter-spacing:0.07em;color:#9ca3af;">
                    Question Breakdown
                </h6>

                <div th:each="r, iter : ${results}"
                     class="qresult-card"
                     th:classappend="${r.correct} ? 'correct-card' : 'wrong-card'">

                    <div class="q-header">
                        <div class="result-icon" th:classappend="${r.correct} ? 'correct' : 'wrong'">
                            <i th:class="${r.correct} ? 'bi bi-check-lg' : 'bi bi-x-lg'"></i>
                        </div>
                        <div>
                            <div style="font-size:0.72rem;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:2px;"
                                 th:text="'Q' + ${iter.count}"></div>
                            <div class="q-text" th:text="${r.question.questionText}"></div>
                        </div>
                    </div>

                    <!-- Options: highlight selected (wrong=red, correct=green, correct answer always green) -->
                    <div th:each="letter : ${ {'A','B','C','D'} }">
                        <div class="option-row"
                             th:with="optText=${letter == 'A'} ? ${r.question.optionA} :
                                              (${letter == 'B'} ? ${r.question.optionB} :
                                              (${letter == 'C'} ? ${r.question.optionC} : ${r.question.optionD})),
                                      isSelected=${r.selected == letter},
                                      isCorrect=${r.question.correctAns == letter}"
                             th:classappend="${isCorrect} ? 'correct-ans' : (${isSelected and !isCorrect} ? 'student-answer wrong-ans' : '')">
                            <div class="opt-badge" th:text="${letter}"></div>
                            <span th:text="${optText}"></span>
                            <i class="bi bi-check-lg ms-auto" th:if="${isCorrect}" style="color:#059669;"></i>
                            <i class="bi bi-x-lg ms-auto" th:if="${isSelected and !isCorrect}" style="color:#dc2626;"></i>
                        </div>
                    </div>
                </div>

                <div class="pb-4"></div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
