<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${test.testTitle} + ' — PrepHunt'">Take Test</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #FFF9F9; font-family: 'Gabarito', sans-serif; }

        .exam-wrap { max-width: 720px; }

        /* Sticky top bar */
        .exam-topbar {
            position: sticky; top: 0; background: white;
            border-bottom: 1px solid var(--color-border);
            padding: 0.75rem 0; margin-bottom: 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 50;
        }
        .exam-title { font-weight: 700; font-size: 1rem; }

        /* Timer */
        .timer-badge {
            background: #fef3c7; color: #d97706;
            border-radius: var(--radius-md); padding: 0.4rem 0.9rem;
            font-weight: 700; font-size: 1rem; letter-spacing: 0.05em;
            display: flex; align-items: center; gap: 6px;
        }
        .timer-badge.urgent { background: #fee2e2; color: #dc2626; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

        /* Progress */
        .progress-bar-wrap { height: 4px; background: #f1f5f9; border-radius: 99px; margin-bottom: 1.5rem; }
        .progress-bar-fill { height: 100%; background: var(--color-primary); border-radius: 99px; transition: width 0.3s; }

        /* Question card */
        .question-card {
            background: white; border: 1px solid var(--color-border);
            border-radius: var(--radius-lg); padding: 1.5rem;
            box-shadow: var(--shadow-sm); margin-bottom: 1rem;
        }
        .q-num { font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.07em; color: #9ca3af; margin-bottom: 0.5rem; }
        .q-text { font-size: 1rem; font-weight: 600; color: var(--color-text-primary); margin-bottom: 1.2rem; }

        .option-btn {
            width: 100%; display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 1rem; border: 2px solid var(--color-border);
            border-radius: var(--radius-md); background: white;
            font-family: inherit; font-size: 0.9rem; text-align: left;
            cursor: pointer; transition: all 0.15s; margin-bottom: 0.5rem;
            color: var(--color-text-primary);
        }
        .option-btn:hover { border-color: var(--color-primary); background: #f5f3ff; }
        .option-btn.selected { border-color: var(--color-primary); background: #f5f3ff; color: var(--color-primary); font-weight: 600; }
        .option-letter-badge {
            width: 28px; height: 28px; border-radius: 50%;
            background: #f3f4f6; display: flex; align-items: center;
            justify-content: center; font-size: 0.75rem; font-weight: 700;
            color: #6b7280; flex-shrink: 0;
        }
        .option-btn.selected .option-letter-badge { background: var(--color-primary); color: white; }

        /* Unanswered highlight */
        .question-card.unanswered { border-color: #fca5a5; }

        /* Submit bar */
        .submit-bar {
            position: sticky; bottom: 0; background: white;
            border-top: 1px solid var(--color-border);
            padding: 1rem 0; margin-top: 1rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        .answered-count { font-size: 0.85rem; color: var(--color-text-secondary); }
    </style>
</head>
<body>
<div class="container-fluid px-4 py-3">
    <div th:replace="navigation/index :: topbar"></div>
    <div class="row align-items-stretch">
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>
        <div class="col ms-4">
            <div class="exam-wrap">

                <!-- Sticky top bar -->
                <div class="exam-topbar">
                    <div>
                        <div class="exam-title" th:text="${test.testTitle}">Test Title</div>
                        <div style="font-size:0.78rem;color:#9ca3af;" th:text="${questions.size()} + ' questions'"></div>
                    </div>
                    <div th:if="${timerMinutes != null}" class="timer-badge" id="timerDisplay">
                        <i class="bi bi-stopwatch"></i>
                        <span id="timerText">--:--</span>
                    </div>
                </div>

                <!-- Progress bar -->
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
                </div>

                <!-- Questions -->
                <div id="questionsContainer">
                    <div class="question-card" th:each="q, iter : ${questions}"
                         th:id="'qcard-' + ${q.questionId}">
                        <div class="q-num" th:text="'Question ' + ${iter.count} + ' of ' + ${questions.size()}"></div>
                        <div class="q-text" th:text="${q.questionText}">Question text</div>

                        <button class="option-btn" th:attr="onclick='selectAnswer(' + ${q.questionId} + ',\'A\', this)'"
                                th:id="'opt-' + ${q.questionId} + '-A'">
                            <span class="option-letter-badge">A</span>
                            <span th:text="${q.optionA}">Option A</span>
                        </button>
                        <button class="option-btn" th:attr="onclick='selectAnswer(' + ${q.questionId} + ',\'B\', this)'"
                                th:id="'opt-' + ${q.questionId} + '-B'">
                            <span class="option-letter-badge">B</span>
                            <span th:text="${q.optionB}">Option B</span>
                        </button>
                        <button class="option-btn" th:attr="onclick='selectAnswer(' + ${q.questionId} + ',\'C\', this)'"
                                th:id="'opt-' + ${q.questionId} + '-C'">
                            <span class="option-letter-badge">C</span>
                            <span th:text="${q.optionC}">Option C</span>
                        </button>
                        <button class="option-btn" th:attr="onclick='selectAnswer(' + ${q.questionId} + ',\'D\', this)'"
                                th:id="'opt-' + ${q.questionId} + '-D'">
                            <span class="option-letter-badge">D</span>
                            <span th:text="${q.optionD}">Option D</span>
                        </button>
                    </div>
                </div>

                <!-- Submit bar -->
                <div class="submit-bar">
                    <span class="answered-count" id="answeredCount">0 / <span th:text="${questions.size()}">0</span> answered</span>
                    <button class="btn btn-dark rounded-3 px-4" onclick="submitTest()">
                        <i class="bi bi-check2-circle me-1"></i> Submit Test
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
<script th:inline="javascript">
    const COURSE_ID     = /*[[${course.courseId}]]*/ null;
    const TEST_ID       = /*[[${test.testId}]]*/ null;
    const TOTAL         = /*[[${questions.size()}]]*/ 0;
    const TIMER_MINUTES = /*[[${timerMinutes}]]*/ null;

    const answers = {};   // questionId → selected letter

    function selectAnswer(qId, letter, btn) {
        // Deselect others in same card
        const card = btn.closest('.question-card');
        card.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        card.classList.remove('unanswered');
        answers[qId] = letter;
        updateProgress();
    }

    function updateProgress() {
        const answered = Object.keys(answers).length;
        document.getElementById('answeredCount').innerHTML =
            answered + ' / <span>' + TOTAL + '</span> answered';
        document.getElementById('progressBar').style.width = (answered / TOTAL * 100) + '%';
    }

    async function submitTest() {
        // Highlight unanswered
        const cards = document.querySelectorAll('.question-card');
        let unanswered = 0;
        cards.forEach(card => {
            const qId = card.id.replace('qcard-', '');
            if (!answers[qId]) { card.classList.add('unanswered'); unanswered++; }
        });

        if (unanswered > 0) {
            if (!confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) return;
        }

        const btn = document.querySelector('.submit-bar button');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Submitting...';

        // Convert keys to string
        const payload = {};
        Object.entries(answers).forEach(([k, v]) => payload[k] = v);

        try {
            const res = await fetch(`/your-courses/${COURSE_ID}/tests/${TEST_ID}/submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            window.location.href = `/your-courses/${COURSE_ID}/tests/${TEST_ID}/result/${data.attemptId}`;
        } catch (e) {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check2-circle me-1"></i> Submit Test';
            alert('Submission failed. Please try again.');
        }
    }

    // ── Timer ─────────────────────────────────────────────────────────────────
    if (TIMER_MINUTES) {
        let remaining = TIMER_MINUTES * 60;
        const display = document.getElementById('timerText');
        const badge   = document.getElementById('timerDisplay');

        const tick = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = m + ':' + s;
            if (remaining <= 60) badge.classList.add('urgent');
            if (remaining <= 0) { clearInterval(tick); submitTest(); }
        }, 1000);

        // Initial display
        const m = Math.floor(remaining / 60).toString().padStart(2, '0');
        display.innerText = m + ':00';
    }
</script>
</body>
</html>
