<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${course.courseName} + ' — Tests'">Tests</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #FFF9F9; font-family: 'Gabarito', sans-serif; }

        .test-card {
            background: white;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 1.2rem 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .test-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.08); transform: translateY(-1px); }

        .test-icon {
            width: 48px; height: 48px; border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; flex-shrink: 0;
        }
        .test-icon.quiz { background: #ede9fe; color: #6c47ff; }
        .test-icon.exam { background: #fef3c7; color: #d97706; }

        .test-info {
            flex: 1;
            min-width: 0;           /* prevents text overflow breaking layout */
        }
        .test-title { font-weight: 700; font-size: 0.97rem; color: var(--color-text-primary); margin-bottom: 3px; }
        .test-meta  { font-size: 0.78rem; color: var(--color-text-secondary); }

        .badge-type {
            font-size: 0.68rem; font-weight: 700; padding: 2px 8px;
            border-radius: 99px; text-transform: uppercase;
        }
        .badge-quiz { background: #ede9fe; color: #6c47ff; }
        .badge-exam { background: #fef3c7; color: #d97706; }

        .test-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-shrink: 0;         /* never shrink — always visible */
            position: relative;
            z-index: 2;
        }

        .empty-state { text-align: center; padding: 4rem; color: var(--color-text-secondary); }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container-fluid px-4 py-3">
    <div th:replace="navigation/index :: topbar"></div>
    <div class="row align-items-stretch">
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>
        <div class="col ms-4">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4 page-header">
                <div>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-1">
                            <li class="breadcrumb-item"><a th:href="@{/your-courses}">Courses</a></li>
                            <li class="breadcrumb-item">
                                <a th:href="@{'/your-courses/' + ${course.courseId} + '/resources'}"
                                   th:text="${course.courseName}">Course</a>
                            </li>
                            <li class="breadcrumb-item active">Tests</li>
                        </ol>
                    </nav>
                    <h2 class="fw-bold mb-0">Tests</h2>
                    <p class="text-muted small mb-0" th:text="${course.courseName}"></p>
                </div>
                <div th:if="${isTeacher}">
                    <a th:href="@{'/your-courses/' + ${course.courseId} + '/tests/create'}"
                       class="btn btn-dark rounded-3">
                        <i class="bi bi-plus-lg me-1"></i> Create Test
                    </a>
                </div>
            </div>

            <!-- Stat cards -->
            <div class="d-flex gap-3 mb-4">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#ede9fe;color:#6c47ff;">
                        <i class="bi bi-patch-question"></i>
                    </div>
                    <div>
                        <div class="stat-value" th:text="${testSummaries.size()}">0</div>
                        <div class="stat-label">Total Tests</div>
                    </div>
                </div>
            </div>

            <!-- Test list -->
            <div class="d-flex flex-column gap-3" th:if="${!testSummaries.isEmpty()}">
                <div class="test-card" th:each="t : ${testSummaries}">

                    <!-- Icon -->
                    <div class="test-icon" th:classappend="${t.testType == 'QUIZ'} ? 'quiz' : 'exam'">
                        <i th:class="${t.testType == 'QUIZ'} ? 'bi bi-patch-question' : 'bi bi-stopwatch'"></i>
                    </div>

                    <!-- Info -->
                    <div class="test-info">
                        <div class="test-title" th:text="${t.testTitle}">Test Title</div>
                        <div class="test-meta">
                            <span class="badge-type me-2"
                                  th:classappend="${t.testType == 'QUIZ'} ? 'badge-quiz' : 'badge-exam'"
                                  th:text="${t.testType}">QUIZ</span>
                            <span th:text="${t.questionCount} + ' questions'"></span>
                            <span class="mx-1">·</span>
                            <span th:text="${t.attemptCount} + ' attempts'"></span>
                        </div>
                    </div>

                    <!-- Teacher actions -->
                    <div th:if="${isTeacher}" class="test-actions">
                        <a th:href="@{'/your-courses/' + ${course.courseId} + '/tests/' + ${t.testId} + '/edit'}"
                           class="btn btn-sm btn-outline-secondary rounded-2">
                            <i class="bi bi-pencil me-1"></i> Edit
                        </a>
                        <a th:href="@{'/your-courses/' + ${course.courseId} + '/tests/' + ${t.testId} + '/results'}"
                           class="btn btn-sm btn-outline-secondary rounded-2">
                            <i class="bi bi-bar-chart me-1"></i> Results
                        </a>
                        <button class="btn btn-sm btn-outline-danger rounded-2"
                                th:attr="onclick='deleteTest(' + ${t.testId} + ')'">
                            <i class="bi bi-trash3"></i>
                        </button>
                    </div>

                    <!-- Student actions -->
                    <div th:unless="${isTeacher}" class="test-actions">
                        <a th:href="@{'/your-courses/' + ${course.courseId} + '/tests/' + ${t.testId} + '/take'}"
                           class="btn btn-sm btn-dark rounded-2">
                            <i class="bi bi-play-fill me-1"></i> Take Test
                        </a>
                    </div>

                </div>
            </div>

            <!-- Empty state -->
            <div class="empty-state" th:if="${testSummaries.isEmpty()}">
                <i class="bi bi-patch-question"></i>
                <p class="fw-semibold">No tests yet</p>
                <p class="small" th:if="${isTeacher}">Click "Create Test" to add your first test.</p>
                <p class="small" th:unless="${isTeacher}">Your teacher hasn't created any tests yet.</p>
            </div>

        </div>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
<script th:inline="javascript">
    const COURSE_ID = /*[[${course.courseId}]]*/ null;
    async function deleteTest(testId) {
        if (!confirm('Delete this test and all its attempts?')) return;
        const res = await fetch(`/your-courses/${COURSE_ID}/tests/${testId}`, { method: 'DELETE' });
        if (res.ok) location.reload();
        else alert('Failed to delete test.');
    }
</script>
</body>
</html>
