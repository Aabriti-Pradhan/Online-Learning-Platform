<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${course.courseName} + ' — Take Test'">Take Test</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #FFF9F9; font-family: 'Gabarito', sans-serif; }
        .test-card {
            background: white; border: 1px solid var(--color-border);
            border-radius: var(--radius-lg); padding: 1.4rem 1.5rem;
            box-shadow: var(--shadow-sm); transition: box-shadow 0.2s, transform 0.15s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .test-card a.btn {
            position: relative;
            z-index: 2;
            pointer-events: auto;
        }
        .test-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.08); transform: translateY(-1px); }
        .test-icon { width: 48px; height: 48px; border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; flex-shrink: 0; }
        .test-icon.quiz { background: #ede9fe; color: #6c47ff; }
        .test-icon.exam { background: #fef3c7; color: #d97706; }
        .badge-type { font-size: 0.68rem; font-weight: 700; padding: 2px 8px;
            border-radius: 99px; text-transform: uppercase; }
        .badge-quiz { background: #ede9fe; color: #6c47ff; }
        .badge-exam { background: #fef3c7; color: #d97706; }
        .past-attempt { font-size: 0.78rem; background: #f8fafc; border: 1px solid var(--color-border);
            border-radius: var(--radius-sm); padding: 4px 10px;
            display: inline-flex; align-items: center; gap: 4px; }
        .empty-state { text-align: center; padding: 4rem; color: var(--color-text-secondary); }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="container-fluid px-4 py-3">
    <div th:replace="navigation/index :: topbar"></div>
    <div class="row align-items-stretch">
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>
        <div class="col ms-4">

            <div class="d-flex justify-content-between align-items-center mb-4 page-header">
                <div>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-1">
                            <li class="breadcrumb-item"><a th:href="@{/your-courses}" th:text="${course.courseName}">Course</a></li>
                            <li class="breadcrumb-item active">Tests</li>
                        </ol>
                    </nav>
                    <h2 class="fw-bold mb-0">Available Tests</h2>
                </div>
            </div>

            <!-- Test cards -->
            <div class="row g-3" th:if="${!testData.isEmpty()}">
                <div class="col-md-4 col-sm-6" th:each="t : ${testData}">
                    <div class="test-card h-100 d-flex flex-column">

                        <div class="test-icon mb-3" th:classappend="${t.testType == 'QUIZ'} ? 'quiz' : 'exam'">
                            <i th:class="${t.testType == 'QUIZ'} ? 'bi bi-patch-question' : 'bi bi-stopwatch'"></i>
                        </div>

                        <div class="fw-bold mb-1" th:text="${t.testTitle}">Title</div>

                        <div class="d-flex align-items-center gap-2 flex-wrap mb-2">
                            <span class="badge-type"
                                  th:classappend="${t.testType == 'QUIZ'} ? 'badge-quiz' : 'badge-exam'"
                                  th:text="${t.testType}">QUIZ</span>
                            <span style="font-size:0.78rem;color:#9ca3af;" th:text="${t.questionCount} + ' questions'"></span>
                            <span th:if="${t.timerMinutes != null}" style="font-size:0.78rem;color:#9ca3af;">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${t.timerMinutes} + ' min'"></span>
                            </span>
                        </div>

                        <!-- Past attempts -->
                        <div class="d-flex gap-2 flex-wrap mb-3" th:if="${!t.pastAttempts.isEmpty()}">
                            <span class="past-attempt" th:each="a : ${t.pastAttempts}">
                                <i class="bi bi-clock-history" style="color:#9ca3af;"></i>
                                <span th:text="${a.score} + '/' + ${a.total}"></span>
                                <a th:href="@{'/your-courses/' + ${course.courseId} + '/tests/' + ${t.testId} + '/result/' + ${a.attemptId}}"
                                   style="color:#6c47ff;text-decoration:none;font-weight:700;">view</a>
                            </span>
                        </div>

                        <a th:href="@{'/your-courses/' + ${course.courseId} + '/tests/' + ${t.testId} + '/take'}"
                           class="btn btn-dark rounded-3 mt-auto">
                            <i class="bi bi-play-fill me-1"></i>
                            <span th:text="${t.pastAttempts.isEmpty()} ? 'Start' : 'Retake'">Start</span>
                        </a>
                    </div>
                </div>
            </div>

            <div class="empty-state" th:if="${testData.isEmpty()}">
                <i class="bi bi-patch-question"></i>
                <p class="fw-semibold">No tests available yet</p>
                <p class="small">Your teacher hasn't created any tests for this course.</p>
            </div>

        </div>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
