<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="eng">
<head>
    <meta charset="UTF-8">
    <title>Your Resources</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #FFF9F9;
            font-family: 'Gabarito', sans-serif;
        }

        /* ── Course Card ─────────────────────────────────── */
        .course-card-wrapper {
            cursor: pointer;
            width: 220px;
        }

        .course-card {
            background: white;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s, transform 0.15s;
            position: relative;
        }

        .course-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.09);
            transform: translateY(-2px);
        }

        /* Coloured top stripe */
        .course-card-stripe {
            height: 6px;
            background: linear-gradient(90deg, #6c47ff, #a78bfa);
        }

        /* Three-dot menu */
        .course-card-menu {
            position: absolute;
            top: 14px;
            right: 12px;
            z-index: 10;
        }

        .course-card-menu .dropdown-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            transition: background 0.15s, color 0.15s;
        }

        .course-card-menu .dropdown-btn:hover {
            background: #f3f4f6;
            color: #374151;
        }

        .course-card-menu .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 32px;
            background: white;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
            min-width: 110px;
            z-index: 20;
            overflow: hidden;
        }

        .course-card-menu .dropdown-content.open {
            display: block;
        }

        .course-card-menu .delete-course-btn {
            display: block;
            width: 100%;
            padding: 9px 14px;
            background: none;
            border: none;
            text-align: left;
            font-size: 0.85rem;
            color: #ef4444;
            cursor: pointer;
            transition: background 0.12s;
        }

        .course-card-menu .delete-course-btn:hover {
            background: #fef2f2;
        }

        /* Card body */
        .course-card-body {
            padding: 1.1rem 1.2rem 1.2rem;
        }

        .course-card-icon-wrap {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            background: #ede9fe;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c47ff;
            font-size: 1.3rem;
            margin-bottom: 0.85rem;
        }

        .course-card-label {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .course-card-name {
            font-weight: 700;
            font-size: 0.92rem;
            color: var(--color-text-primary);
            line-height: 1.3;
            /* clamp to 2 lines */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1.2rem 0.85rem;
            border-top: 1px solid #f3f4f6;
        }

        .course-card-footer-label {
            font-size: 0.72rem;
            color: #9ca3af;
        }

        .course-card-arrow {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c47ff;
            font-size: 0.8rem;
            transition: background 0.15s;
        }

        .course-card:hover .course-card-arrow {
            background: #ede9fe;
        }
    </style>
</head>

<body>

<div class="container-fluid px-4 py-3">

    <div th:replace="navigation/index :: topbar"></div>

    <div class="row align-items-stretch">

        <!-- SIDEBAR -->
        <div class="col-auto">
            <div th:replace="sidebar/index :: sidebar"></div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col ms-4">

            <div class="d-flex justify-content-between align-items-center mb-4 page-header page-title">
                <h2 class="fw-bold">Your Courses</h2>
                <div class="dropdown">
                    <button class="btn p-0 border-0 bg-transparent"
                            data-bs-toggle="modal"
                            data-bs-target="#createCourseModal">
                        <i class="bi bi-plus fs-1"></i>
                    </button>
                </div>
            </div>

            <!-- Create Course Modal -->
            <div class="modal fade" id="createCourseModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content rounded-4">
                        <div class="modal-header">
                            <h5 class="modal-title fw-bold">Create Course</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <input type="text" id="courseNameInput" class="form-control"
                                       placeholder="Enter Course Name">
                            </div>
                            <div>
                                <textarea id="courseDescInput" class="form-control" rows="3"
                                          placeholder="Enter Course Description"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-dark w-100" onclick="createCourse()">Create</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Delete Confirmation Modal -->
            <div class="modal fade" id="deleteCourseModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content rounded-4">
                        <div class="modal-header border-0">
                            <h5 class="modal-title fw-bold">Delete Course</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <p class="mb-0">Are you sure you want to delete this course?</p>
                            <small class="text-danger">This action cannot be undone.</small>
                        </div>
                        <div class="modal-footer border-0">
                            <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button id="confirmDeleteBtn" class="btn btn-dark">Delete</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Toast -->
            <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
                <div id="uploadToast" class="toast align-items-center text-bg-dark border-0" role="alert">
                    <div class="d-flex">
                        <div class="toast-body w-100">
                            <div id="toastMessage">Uploading...</div>
                            <div class="progress mt-2" style="height:5px;">
                                <div id="uploadProgress" class="progress-bar" role="progressbar" style="width: 0%;"></div>
                            </div>
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            </div>

            <!-- COURSE GRID -->
            <div class="d-flex flex-wrap gap-4">
                <div th:each="course : ${courses}">

                    <div class="course-card-wrapper"
                         th:data-url="@{'/your-courses/' + ${course.courseId} + '/resources'}">
                        <div class="course-card">

                            <!-- Purple top stripe -->
                            <div class="course-card-stripe"></div>

                            <!-- Three-dot menu -->
                            <div class="course-card-menu menu">
                                <button class="dropdown-btn btn p-0 border-0 bg-transparent">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <div class="dropdown-content">
                                    <button class="delete-course-btn"
                                            th:data-course-id="${course.courseId}">
                                        <i class="bi bi-trash3 me-1"></i> Delete
                                    </button>
                                </div>
                            </div>

                            <!-- Body -->
                            <div class="course-card-body">
                                <div class="course-card-icon-wrap">
                                    <i class="bi bi-journal-bookmark-fill"></i>
                                </div>
                                <div class="course-card-label">Course</div>
                                <div class="course-card-name" th:text="${course.courseName}">Course Name</div>
                            </div>

                            <!-- Footer -->
                            <div class="course-card-footer">
                                <span class="course-card-footer-label">View resources</span>
                                <div class="course-card-arrow">
                                    <i class="bi bi-arrow-right"></i>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <div th:replace="footer/index :: footer"></div>

</div>

<script th:src="@{/js/script.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Card click → navigate (ignore menu clicks)
    document.querySelectorAll('.course-card-wrapper').forEach(wrapper => {
        wrapper.addEventListener('click', function (e) {
            if (e.target.closest('.menu')) return;
            window.location.href = this.getAttribute('data-url');
        });
    });

    // Three-dot dropdown toggle
    document.querySelectorAll('.dropdown-btn').forEach(btn => {
        btn.addEventListener('click', function (e) {
            e.stopPropagation();
            const menu = this.nextElementSibling;
            // close all others
            document.querySelectorAll('.dropdown-content.open').forEach(m => {
                if (m !== menu) m.classList.remove('open');
            });
            menu.classList.toggle('open');
        });
    });

    // Close dropdowns when clicking outside
    document.addEventListener('click', function (e) {
        if (e.target.closest('.menu')) return;

        document.querySelectorAll('.dropdown-content.open')
            .forEach(m => m.classList.remove('open'));
    });

    // Delete flow
    let selectedCourseId = null;
    const deleteModal = new bootstrap.Modal(document.getElementById('deleteCourseModal'));
    const toastElement = document.getElementById('uploadToast');
    const toast = new bootstrap.Toast(toastElement);
    const toastMessage = document.getElementById('toastMessage');
    const progressBar = document.getElementById('uploadProgress');

    document.querySelectorAll('.delete-course-btn').forEach(button => {
        button.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            selectedCourseId = button.getAttribute('data-course-id');
            deleteModal.show();
        });
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
        deleteModal.hide();
        toastMessage.innerText = "Deleting course...";
        progressBar.style.width = "30%";
        toast.show();

        fetch(`/delete-course/${selectedCourseId}`, { method: 'DELETE' })
            .then(res => {
                progressBar.style.width = "70%";
                if (res.ok) {
                    setTimeout(() => {
                        progressBar.style.width = "100%";
                        toastMessage.innerText = "Course deleted successfully!";
                        setTimeout(() => location.reload(), 800);
                    }, 500);
                } else {
                    toastMessage.innerText = "Failed to delete course.";
                    progressBar.style.width = "100%";
                }
            });
    });
</script>
</body>
</html>
