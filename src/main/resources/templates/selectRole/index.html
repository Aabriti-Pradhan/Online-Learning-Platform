<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Join as — PrepHunt</title>
    <link href="/images/logo.png" rel="icon" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #FFF9F9;
            font-family: 'Gabarito', sans-serif;
            min-height: 100vh; margin: 0; padding: 0;
        }

        /* Navbar — identical style to home page */
        .site-navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.25rem 2rem;
            background: transparent;
        }
        .nav-brand {
            display: flex; align-items: center; gap: 0.6rem;
            font-size: 1.3rem; font-weight: 800; color: #1a1a1a;
            text-decoration: none;
        }
        .nav-brand img { height: 44px; }
        .nav-pill {
            display: flex; align-items: center;
            background: #1a1a1a; border-radius: 10px;
            padding: 0.4rem 1.25rem; gap: 0.1rem;
        }
        .nav-pill a {
            color: rgba(255,255,255,0.8); text-decoration: none;
            padding: 0.35rem 0.9rem; border-radius: 50px;
            font-size: 0.88rem; font-weight: 500;
            transition: color 0.2s, background 0.2s;
        }
        .nav-pill a:hover { color: #fff; background: rgba(255,255,255,0.12); }
        .btn-nav {
            background: #1a1a1a; color: white; border: none;
            border-radius: 10px; padding: 0.5rem 1.3rem;
            font-size: 0.88rem; font-weight: 700;
            text-decoration: none; transition: background 0.2s;
        }
        .btn-nav:hover { background: #333; color: white; }

        /* Page content */
        .page-body {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: calc(100vh - 90px);
            padding: 2rem;
            text-align: center;
        }

        .page-badge {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: white; border: 1px solid #e5e7eb;
            border-radius: 50px; padding: 0.4rem 1.1rem;
            font-size: 0.82rem; font-weight: 600; color: #4a7c59;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        h2 {
            font-size: 2.5rem; font-weight: 900;
            color: #1a1a1a; margin-bottom: 0.5rem;
        }
        .subtitle { color: #6b7280; font-size: 1rem; margin-bottom: 3rem; }

        /* Role cards */
        .role-cards { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
        .role-card {
            background: white; border: 2px solid #e5e7eb;
            border-radius: 20px; padding: 2.5rem 2.5rem;
            width: 240px; cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
            display: flex; flex-direction: column;
            align-items: center; text-align: center;
            text-decoration: none;
        }
        .role-card:hover {
            border-color: #4a7c59;
            box-shadow: 0 12px 36px rgba(74,124,89,0.15);
            transform: translateY(-4px);
        }
        .role-card-icon {
            width: 72px; height: 72px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; margin-bottom: 1.25rem;
        }
        .role-card-icon.student { background: #d1fae5; color: #065f46; }
        .role-card-icon.teacher { background: #ede9fe; color: #6c47ff; }
        .role-card-title { font-size: 1.1rem; font-weight: 800; color: #1a1a1a; margin-bottom: 0.4rem; }
        .role-card-desc  { font-size: 0.82rem; color: #9ca3af; line-height: 1.5; }
        .role-card-btn {
            margin-top: 1.25rem; width: 100%;
            padding: 0.6rem 0; border-radius: 50px;
            font-size: 0.88rem; font-weight: 700;
            border: none; cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .role-card-btn.student-btn { background: #d1fae5; color: #065f46; }
        .role-card-btn.student-btn:hover { background: #a7f3d0; }
        .role-card-btn.teacher-btn { background: #ede9fe; color: #6c47ff; }
        .role-card-btn.teacher-btn:hover { background: #ddd6fe; }

        .error-text { color: #dc2626; font-size: 0.88rem; margin-top: 1rem; }
    </style>
</head>
<body>

<!-- Navbar — same style as home -->
<nav class="site-navbar">
    <a class="nav-brand" href="/">
        <img src="/images/logo.png" alt="PrepHunt">
        PrepHunt
    </a>
    <div class="nav-pill">
        <a href="/#about">About</a>
        <a href="/#services">Services</a>
        <a href="/#contact">Contact</a>
        <a href="/repository">Repository</a>
    </div>
    <a class="btn-nav" href="/login">Log in</a>
</nav>

<div class="page-body">
    <div class="page-badge">
        <i class="bi bi-person-check"></i> Create your account
    </div>
    <h2>Join as...</h2>
    <p class="subtitle">Choose your role to get started with PrepHunt</p>

    <form class="role-cards" method="post" th:action="@{/select-role}">
        <button class="role-card" name="role" type="submit" value="STUDENT"
                style="background:none; border:2px solid #e5e7eb; cursor:pointer; font-family:inherit;">
            <div class="role-card-icon student"><i class="bi bi-mortarboard-fill"></i></div>
            <div class="role-card-title">Student</div>
            <div class="role-card-desc">Access courses, take tests, track your progress and collaborate with peers.</div>
            <div class="role-card-btn student-btn">Join as Student</div>
        </button>

        <button class="role-card" name="role" type="submit" value="TEACHER"
                style="background:none; border:2px solid #e5e7eb; cursor:pointer; font-family:inherit;">
            <div class="role-card-icon teacher"><i class="bi bi-person-workspace"></i></div>
            <div class="role-card-title">Teacher</div>
            <div class="role-card-desc">Create courses, upload resources, set tests and monitor student progress.</div>
            <div class="role-card-btn teacher-btn">Join as Teacher</div>
        </button>
    </form>

    <p class="error-text" th:if="${param.error}"><i class="bi bi-exclamation-circle me-1"></i>Invalid role selected. Please try again.</p>

    <p style="margin-top:2rem; font-size:0.88rem; color:#9ca3af;">
        Already have an account? <a href="/login" style="color:#4a7c59; font-weight:700;">Log in</a>
    </p>
</div>

</body>
</html>
