<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head><meta charset="UTF-8"></head>
<body>

<aside th:fragment="sidebar">

    <style>
        .nav-subitems {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.25s ease;
        }
        .nav-group.open .nav-subitems {
            max-height: 300px;
        }
        .nav-course-list {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }
        .nav-course-list.open {
            max-height: 1000px;
        }
        .nav-chevron {
            margin-left: auto;
            font-size: 0.7rem;
            transition: transform 0.2s ease;
            flex-shrink: 0;
            color: #9ca3af;
        }
        .nav-collapsible-btn {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-sm) var(--space-md);
            color: var(--color-text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition-fast);
            cursor: pointer;
            position: relative;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .nav-collapsible-btn::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            height: 100%; width: 3px;
            background: var(--color-accent);
            transform: scaleY(0);
            transition: var(--transition-base);
            border-radius: 0 2px 2px 0;
        }
        .nav-collapsible-btn:hover {
            background: var(--color-bg);
            color: var(--color-primary);
            transform: translateX(4px);
        }
        .nav-collapsible-btn:hover::before { transform: scaleY(1); }
        .nav-collapsible-btn.active {
            background: linear-gradient(135deg, rgba(74,124,89,0.1) 0%, rgba(74,124,89,0.05) 100%);
            color: var(--color-accent);
            font-weight: 600;
        }
        .nav-collapsible-btn.active::before { transform: scaleY(1); }
        .nav-collapsible-btn.list-open .nav-chevron { transform: rotate(180deg); }
        .nav-group.open > .nav-collapsible-btn .nav-chevron { transform: rotate(180deg); }

        /* Remove all focus/active outlines completely */
        .nav-collapsible-btn,
        .nav-item,
        .nav-subitem {
            outline: none !important;
            box-shadow: none !important;
        }

        /* Remove on focus */
        .nav-collapsible-btn:focus,
        .nav-item:focus,
        .nav-subitem:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(108, 71, 255, 0.2);
        }

        /* Remove on click (important) */
        .nav-collapsible-btn:active,
        .nav-item:active,
        .nav-subitem:active {
            outline: none !important;
            box-shadow: none !important;
        }

        /* Remove Bootstrap focus ring */
        button:focus,
        button:active,
        a:focus,
        a:active {
            outline: none !important;
            box-shadow: none !important;
        }

        /* Kill EVERYTHING causing outline */
        *:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        *:focus-visible {
            outline: none !important;
            box-shadow: none !important;
        }

        /* Specifically for your sidebar elements */
        .nav-collapsible-btn,
        .nav-item,
        .nav-subitem {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }

        /* Also kill any border that may be applied */
        .nav-item,
        .nav-subitem {
            border: none !important;
        }

        button.nav-item {
            background-color: transparent;
        }
        button.nav-item:not(.active):not(:hover) {
            background-color: transparent;
        }

        /* Fix: sidebar as flex column, user profile fixed at top, nav scrolls */
        .sidebar-trial {
            display: flex !important;
            flex-direction: column !important;
            padding: 0 !important;
            overflow: hidden !important;
        }
        .sidebar-user-wrap {
            padding: var(--space-lg) var(--space-md) var(--space-md);
            flex-shrink: 0;
            background: white;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            z-index: 2;
        }
        .sidebar-nav-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: var(--space-md);
            scrollbar-width: none;
        }
        .sidebar-nav-wrap::-webkit-scrollbar { display: none; }
    </style>

    <div class="sidebar-trial">

        <!-- ── User profile (fixed at top, never scrolls) ── -->
        <div class="sidebar-user-wrap">
            <div class="user-profile" style="position:static;margin-bottom:0;">
                <div class="avatar-circle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="user-info">
                    <div class="username" th:text="${loggedInUser != null} ? ${loggedInUser.username} : 'User'">User</div>
                    <div class="user-email" th:text="${loggedInUser != null} ? ${loggedInUser.email} : ''"></div>
                </div>
            </div>
        </div>

        <div class="sidebar-nav-wrap">
            <nav class="sidebar-nav">

                <!-- ════════════ TEACHER NAV ════════════ -->
                <div class="nav-section" sec:authorize="hasRole('TEACHER')">
                    <div class="nav-label">My Courses</div>

                    <!-- All Courses toggle -->
                    <button class="nav-item"
                            id="teacherTopBtn"
                            th:classappend="${currentPath != null and currentPath.startsWith('/your-courses')} ? ' active' : ''"
                            onclick="toggleList('teacherList', this)">
                        <i class="bi bi-grid"></i>
                        <span>All Courses</span>
                        <i class="bi bi-chevron-down nav-chevron"></i>
                    </button>

                    <div class="nav-course-list" id="teacherList"
                         th:classappend="${currentPath != null and currentPath.startsWith('/your-courses')} ? ' open' : ''">
                        <div style="margin-left: 0.75rem; padding-top: 2px;">

                            <!--                        <a href="/your-courses" class="nav-item" style="font-size:0.88rem;"-->
                            <!--                           th:classappend="${currentPath == '/your-courses'} ? ' active' : ''">-->
                            <!--                            <i class="bi bi-grid-fill me-2" style="font-size:0.8rem;width:20px;text-align:center;"></i>-->
                            <!--                            <span>All Courses</span>-->
                            <!--                        </a>-->

                            <div th:each="course : ${userCourses}" class="nav-group"
                                 th:classappend="${currentPath != null and currentPath.startsWith('/your-courses/' + course.courseId)} ? ' open' : ''">

                                <button class="nav-item" style="font-size:0.88rem;"
                                        th:classappend="${currentPath != null and currentPath.startsWith('/your-courses/' + course.courseId)} ? ' active' : ''"
                                        th:attr="data-href='/your-courses/' + ${course.courseId} + '/chapters'"
                                        onclick="toggleCourse(this)">
                                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                                    </svg>
                                    <span th:text="${course.courseName}">Course</span>
                                    <i class="bi bi-chevron-down nav-chevron"></i>
                                </button>

                                <div class="nav-subitems">
                                    <a th:href="@{'/your-courses/' + ${course.courseId} + '/chapters'}"
                                       class="nav-subitem"
                                       th:classappend="${currentPath != null and currentPath.startsWith('/your-courses/' + course.courseId)} ? ' active' : ''">
                                        <i class="bi bi-collection me-2"></i><span>Chapters</span>
                                    </a>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="nav-label mt-3">Tools</div>

                    <a href="/progress-tracker" class="nav-item"
                       th:classappend="${currentPath == '/progress-tracker'} ? ' active' : ''">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="20" x2="12" y2="10"></line>
                            <line x1="18" y1="20" x2="18" y2="4"></line>
                            <line x1="6"  y1="20" x2="6"  y2="16"></line>
                        </svg>
                        <span>Progress</span>
                    </a>

                    <a href="/friends" class="nav-item"
                       th:classappend="${currentPath == '/friends'} ? ' active' : ''">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span>Students</span>
                    </a>
                </div>

                <!-- ════════════ STUDENT NAV ════════════ -->
                <div class="nav-section" sec:authorize="hasRole('STUDENT')">

                    <div class="nav-label">Browse Courses</div>

                    <a href="/repository" class="nav-item"
                       th:classappend="${currentPath == '/repository'} ? ' active' : ''">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <span>Browse Courses</span>
                    </a>

                    <div class="nav-label mt-2">Enrolled Courses</div>

                    <!-- Enrolled Courses toggle -->
                    <button class="nav-item"
                            id="studentTopBtn"
                            th:classappend="${currentPath != null and currentPath.startsWith('/your-courses')} ? ' active' : ''"
                            onclick="toggleList('studentList', this)">
                        <i class="bi bi-grid"></i>
                        <span>Enrolled Courses</span>
                        <i class="bi bi-chevron-down nav-chevron"></i>
                    </button>

                    <div class="nav-course-list" id="studentList"
                         th:classappend="${currentPath != null and currentPath.startsWith('/your-courses')} ? ' open' : ''">
                        <div style="margin-left: 0.75rem; padding-top: 2px;">

                            <!--                        <a href="/your-courses" class="nav-item" style="font-size:0.88rem;"-->
                            <!--                           th:classappend="${currentPath == '/your-courses'} ? ' active' : ''">-->
                            <!--                            <i class="bi bi-grid-fill me-2" style="font-size:0.8rem;width:20px;text-align:center;"></i>-->
                            <!--                            <span>All Enrolled</span>-->
                            <!--                        </a>-->

                            <div th:each="course : ${userCourses}" class="nav-group"
                                 th:classappend="${currentPath != null and currentPath.startsWith('/your-courses/' + course.courseId)} ? ' open' : ''">

                                <button class="nav-item" style="font-size:0.88rem;"
                                        th:classappend="${currentPath != null and currentPath.startsWith('/your-courses/' + course.courseId)} ? ' active' : ''"
                                        th:attr="data-href='/your-courses/' + ${course.courseId} + '/chapters'"
                                        onclick="toggleCourse(this)">
                                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                                    </svg>
                                    <span th:text="${course.courseName}">Course</span>
                                    <i class="bi bi-chevron-down nav-chevron"></i>
                                </button>

                                <div class="nav-subitems">
                                    <a th:href="@{'/your-courses/' + ${course.courseId} + '/chapters'}"
                                       class="nav-subitem"
                                       th:classappend="${currentPath != null and currentPath.startsWith('/your-courses/' + course.courseId)} ? ' active' : ''">
                                        <i class="bi bi-collection me-2"></i><span>Chapters</span>
                                    </a>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="nav-label mt-3">Main</div>

                    <a href="/your-resources" class="nav-item"
                       th:classappend="${currentPath == '/your-resources'} ? ' active' : ''">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        </svg>
                        <span>Your Resources</span>
                    </a>

                    <a href="/progress-tracker" class="nav-item"
                       th:classappend="${currentPath == '/progress-tracker'} ? ' active' : ''">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="20" x2="12" y2="10"></line>
                            <line x1="18" y1="20" x2="18" y2="4"></line>
                            <line x1="6"  y1="20" x2="6"  y2="16"></line>
                        </svg>
                        <span>Progress Tracker</span>
                    </a>

                    <a href="/chat-ai" class="nav-item"
                       th:classappend="${currentPath == '/chat-ai'} ? ' active' : ''">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span>Chat AI</span>
                    </a>

                    <a href="/friends" class="nav-item"
                       th:classappend="${currentPath == '/friends'} ? ' active' : ''">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span>Friends</span>
                    </a>

                    <a href="/shared-tests" class="nav-item"
                       th:classappend="${currentPath == '/shared-tests'} ? ' active' : ''">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="18" cy="5" r="3"></circle>
                            <circle cx="6" cy="12" r="3"></circle>
                            <circle cx="18" cy="19" r="3"></circle>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                        </svg>
                        <span>Shared Tests</span>
                    </a>
                </div>

            </nav>
        </div><!-- end sidebar-nav-wrap -->
    </div>

    <script>
        // Toggle All Courses / Enrolled Courses section
        function toggleList(listId, btn) {
            const list = document.getElementById(listId);
            if (!list) return;
            const isOpen = list.classList.contains('open');

            if (isOpen) {
                // Already open — just collapse, stay on page
                list.classList.remove('open');
                btn.classList.remove('list-open');
            } else {
                // Closed — open it and navigate to /your-courses
                list.classList.add('open');
                btn.classList.add('list-open');
                if (window.location.pathname !== '/your-courses') {
                    window.location.href = '/your-courses';
                }
            }
        }

        // Toggle individual course row
        function toggleCourse(btn) {
            const group  = btn.closest('.nav-group');
            const href   = btn.getAttribute('data-href');
            const isOpen = group.classList.contains('open');
            const onPage = href && window.location.pathname.startsWith(href);

            if (isOpen && onPage) {
                // Already here and open — just collapse
                group.classList.remove('open');
            } else {
                // Navigate (which will reload and auto-open via Thymeleaf)
                window.location.href = href;
            }
        }

        // On load: sync chevron on top buttons if list is already open
        document.addEventListener('DOMContentLoaded', function () {
            ['teacherList', 'studentList'].forEach(function(id) {
                const list = document.getElementById(id);
                if (list && list.classList.contains('open')) {
                    const btn = list.previousElementSibling;
                    if (btn) btn.classList.add('list-open');
                }
            });
        });
    </script>

</aside>

</body>
</html>
