<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head><meta charset="UTF-8"></head>
<body>

<aside th:fragment="sidebar">

    <style>
        .nav-subitems {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.25s ease;
        }
        .nav-group.open .nav-subitems {
            max-height: 300px;
        }
        .nav-course-list {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }
        .nav-course-list.open {
            max-height: 1000px;
        }
        .nav-chevron {
            margin-left: auto;
            font-size: 0.7rem;
            transition: transform 0.2s ease;
            flex-shrink: 0;
            color: #9ca3af;
        }
        .nav-collapsible-btn {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-sm) var(--space-md);
            color: var(--color-text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition-fast);
            cursor: pointer;
            position: relative;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .nav-collapsible-btn::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            height: 100%; width: 3px;
            background: var(--color-accent);
            transform: scaleY(0);
            transition: var(--transition-base);
            border-radius: 0 2px 2px 0;
        }
        .nav-collapsible-btn:hover {
            background: var(--color-bg);
            color: var(--color-primary);
            transform: translateX(4px);
        }
        .nav-collapsible-btn:hover::before { transform: scaleY(1); }
        .nav-collapsible-btn.active {
            background: linear-gradient(135deg, rgba(74,124,89,0.1) 0%, rgba(74,124,89,0.05) 100%);
            color: var(--color-accent);
            font-weight: 600;
        }
        .nav-collapsible-btn.active::before { transform: scaleY(1); }
        .nav-collapsible-btn.list-open .nav-chevron { transform: rotate(180deg); }
        .nav-group.open > .nav-collapsible-btn .nav-chevron { transform: rotate(180deg); }

        /* Remove all focus/active outlines completely */
        .nav-collapsible-btn,
        .nav-item,
        .nav-subitem {
            outline: none !important;
            box-shadow: none !important;
        }

        .nav-collapsible-btn:focus,
        .nav-item:focus,
        .nav-subitem:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(108, 71, 255, 0.2);
        }

        .nav-collapsible-btn:active,
        .nav-item:active,
        .nav-subitem:active {
            outline: none !important;
            box-shadow: none !important;
        }

        button:focus,
        button:active,
        a:focus,
        a:active {
            outline: none !important;
            box-shadow: none !important;
        }

        *:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        *:focus-visible {
            outline: none !important;
            box-shadow: none !important;
        }

        .nav-collapsible-btn,
        .nav-item,
        .nav-subitem {
            border: none !important;
            outline: none !important;
            box-shadow: none !important;
        }

        .nav-item,
        .nav-subitem {
            border: none !important;
        }

        button.nav-item {
            background-color: transparent;
        }
        button.nav-item:not(.active):not(:hover) {
            background-color: transparent;
        }

        /* Sidebar layout */
        .sidebar-trial {
            display: flex !important;
            flex-direction: column !important;
            padding: 0 !important;
            overflow: hidden !important;
        }
        .sidebar-user-wrap {
            padding: var(--space-lg) var(--space-md) var(--space-md);
            flex-shrink: 0;
            background: white;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            z-index: 2;
        }
        .sidebar-nav-wrap {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: var(--space-md);
            scrollbar-width: none;
        }
        .sidebar-nav-wrap::-webkit-scrollbar { display: none; }

        /* Clickable user card */
        .user-profile-btn {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            background: none;
            border: none;
            padding: 0.5rem 0.625rem;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            transition: background 0.18s ease;
            font-family: inherit;
            position: relative;
            background: rgba(74,124,89,0.07);
        }
        .user-profile-btn:hover {
            background: rgba(74,124,89,0.07);
        }
        .user-profile-btn .edit-hint {
            margin-left: auto;
            font-size: 0.72rem;
            color: #9ca3af;
            opacity: 0;
            transition: opacity 0.18s ease;
            white-space: nowrap;
        }
        .user-profile-btn:hover .edit-hint {
            opacity: 1;
        }

        /* Profile modal */
        .profile-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .profile-modal-overlay.show {
            display: flex;
        }
        .profile-modal {
            background: #fff;
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
            position: relative;
            animation: slideUp 0.22s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(24px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .profile-modal-close {
            position: absolute;
            top: 1rem; right: 1rem;
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #6b7280;
            line-height: 1;
            padding: 2px 6px;
            border-radius: 6px;
        }
        .profile-modal-close:hover { background: #f3f4f6; color: #111; }
        .profile-modal h2 {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0 0 0.25rem;
            color: #111827;
        }
        .profile-modal .modal-subtitle {
            font-size: 0.82rem;
            color: #6b7280;
            margin-bottom: 1.5rem;
        }
        .profile-modal label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.3rem;
        }
        .profile-modal input[type="text"],
        .profile-modal input[type="password"],
        .profile-modal input[type="email"] {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.15s;
            box-sizing: border-box;
            background: #fafafa;
        }
        .profile-modal input:focus {
            border-color: #4a7c59;
            background: #fff;
            outline: none !important;
            box-shadow: 0 0 0 3px rgba(74,124,89,0.12) !important;
        }
        .profile-modal .form-group {
            margin-bottom: 1rem;
        }
        .profile-modal .form-hint {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 0.25rem;
        }
        .profile-modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }
        .btn-profile-save {
            flex: 1;
            padding: 0.6rem 1rem;
            background: #4a7c59;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-profile-save:hover { background: #3a6347; }
        .btn-profile-cancel {
            padding: 0.6rem 1rem;
            background: #f3f4f6;
            color: #374151;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-profile-cancel:hover { background: #e5e7eb; }
        .profile-alert {
            padding: 0.55rem 0.75rem;
            border-radius: 8px;
            font-size: 0.83rem;
            margin-bottom: 1rem;
        }
        .profile-alert.success { background: #d1fae5; color: #065f46; }
        .profile-alert.error   { background: #fee2e2; color: #991b1b; }
        .profile-modal .divider {
            border: none;
            border-top: 1.5px solid #f3f4f6;
            margin: 1rem 0;
        }
        .profile-modal .section-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #9ca3af;
            margin-bottom: 0.75rem;
        }
    </style>

                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                    </svg>
                    Edit

                                </button>

                                <div class="nav-subitems">
                                    <a th:href="@{'/your-courses/' + ${course.courseId} + '/chapters'}"

                                       th:classappend="${currentPath != null and currentPath.startsWith('/your-courses/' + course.courseId)} ? ' active' : ''">
                                        <i class="bi bi-collection me-2"></i><span>Chapters</span>
                                    </a>
                                </div>
                            </div>

                    </div>

                        <span>Enrolled Courses</span>

                    <div class="nav-course-list" id="studentList"

                                <button class="nav-item" style="font-size:0.88rem;"

                                        th:attr="data-href='/your-courses/' + ${course.courseId} + '/chapters'"

                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        </svg>
                        <span>Your Resources</span>
                    </a>

                    <a href="/progress-tracker" class="nav-item"
                       th:classappend="${currentPath == '/progress-tracker'} ? ' active' : ''">

                            <line x1="12" y1="20" x2="12" y2="10"></line>
                            <line x1="18" y1="20" x2="18" y2="4"></line>
                            <line x1="6"  y1="20" x2="6"  y2="16"></line>

    <!-- ══════════════════════════════════════════════════ -->
    <!--   PROFILE EDIT MODAL                              -->
    <!-- ══════════════════════════════════════════════════ -->
    <div class="profile-modal-overlay" id="profileModalOverlay" onclick="handleOverlayClick(event)">
        <div class="profile-modal" id="profileModal">
            <button class="profile-modal-close" onclick="closeProfileModal()" title="Close">&#x2715;</button>

            <h2>Edit Profile</h2>
            <p class="modal-subtitle"
               th:text="${loggedInUser != null} ? ${loggedInUser.email} : ''"></p>

            <!-- Flash messages from redirect -->
            <div th:if="${profileSuccess}" class="profile-alert success" th:text="${profileSuccess}"></div>
            <div th:if="${profileError}"   class="profile-alert error"   th:text="${profileError}"></div>

            <form th:action="@{/profile/update}" method="post">
                <!-- Pass current page so we redirect back here after save -->
                <input type="hidden" name="redirectUrl" id="profileRedirectUrl" value="/">

                <div class="section-label">Basic Info</div>

                <div class="form-group">
                    <label for="profileUsername">Username</label>
                    <input type="text"
                           id="profileUsername"
                           name="username"
                           th:value="${loggedInUser != null} ? ${loggedInUser.username} : ''"
                           placeholder="Enter new username"
                           autocomplete="username">
                </div>

                <hr class="divider">

                <div class="section-label">Change Password</div>

                <div class="form-group">
                    <label for="profilePassword">New Password</label>
                    <input type="password"
                           id="profilePassword"
                           name="password"
                           placeholder="Leave blank to keep current"
                           autocomplete="new-password">
                    <div class="form-hint">Minimum 6 characters</div>
                </div>

                <div class="form-group">
                    <label for="profileConfirmPassword">Confirm Password</label>
                    <input type="password"
                           id="profileConfirmPassword"
                           name="confirmPassword"
                           placeholder="Repeat new password"
                           autocomplete="new-password">
                </div>

                <div class="profile-modal-actions">
                    <button type="button" class="btn-profile-cancel" onclick="closeProfileModal()">Cancel</button>
                    <button type="submit" class="btn-profile-save">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Navigation helpers
        function toggleList(listId, btn) {
            const list = document.getElementById(listId);
            if (!list) return;
            const isOpen = list.classList.contains('open');

            if (isOpen) {
                list.classList.remove('open');
                btn.classList.remove('list-open');
            } else {
                list.classList.add('open');
                btn.classList.add('list-open');
                if (window.location.pathname !== '/your-courses') {
                    window.location.href = '/your-courses';
                }
            }
        }

        function toggleCourse(btn) {
            const group  = btn.closest('.nav-group');
            const href   = btn.getAttribute('data-href');
            const isOpen = group.classList.contains('open');
            const onPage = href && window.location.pathname.startsWith(href);

            if (isOpen && onPage) {
                group.classList.remove('open');
            } else {
                window.location.href = href;
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            ['teacherList', 'studentList'].forEach(function(id) {
                const list = document.getElementById(id);
                if (list && list.classList.contains('open')) {
                    const btn = list.previousElementSibling;
                    if (btn) btn.classList.add('list-open');
                }
            });
        });

        // Profile modal
        function openProfileModal() {
            // Set redirect URL to current page so we return here after save
            const redirectInput = document.getElementById('profileRedirectUrl');
            if (redirectInput) {
                redirectInput.value = window.location.pathname + window.location.search;
            }
            document.getElementById('profileModalOverlay').classList.add('show');
            document.body.style.overflow = 'hidden';

            // Auto-open if there was a flash message (means we just came back from a save)
            const hasAlert = document.querySelector('.profile-modal .profile-alert');
            if (hasAlert) {
                document.getElementById('profileModalOverlay').classList.add('show');
            }
        }

        function closeProfileModal() {
            document.getElementById('profileModalOverlay').classList.remove('show');
            document.body.style.overflow = '';
        }

        function handleOverlayClick(event) {
            // Close only when clicking the dark backdrop, not the modal itself
            if (event.target === document.getElementById('profileModalOverlay')) {
                closeProfileModal();
            }
        }

        // Re-open modal automatically if there's a flash message (after redirect)
        document.addEventListener('DOMContentLoaded', function () {
            const hasAlert = document.querySelector('#profileModal .profile-alert');
            if (hasAlert) {
                openProfileModal();
            }
        });

        // Close on Escape key
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeProfileModal();
        });
    </script>

</aside>
